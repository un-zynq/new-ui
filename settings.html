<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050608; --card: #111318; --border: #242930; --text: #8e95a2; --accent: #89b4fa; }
        body { font-family: 'Inter', sans-serif; background: transparent; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { width: 90%; max-width: 380px; background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); backdrop-filter: blur(15px); }
        .group { margin-bottom: 15px; }
        label { display: block; font-size: 0.6rem; text-transform: uppercase; color: var(--text); margin-bottom: 5px; font-weight: 700; letter-spacing: 1px; }
        input, select { width: 100%; padding: 10px; background: #000; border: 1px solid var(--border); border-radius: 8px; color: white; outline: none; font-size: 0.8rem; box-sizing: border-box; }
        .color-picker-wrapper { display: flex; align-items: center; gap: 12px; background: #000; border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; cursor: pointer; transition: 0.2s; }
        .color-box { width: 28px; height: 28px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); }
        #themeColor { position: absolute; opacity: 0; width: 0; height: 0; }
        .footer { margin-top: 25px; display: flex; flex-direction: column; gap: 10px; }
        .btn-row { display: flex; gap: 10px; }
        button { flex: 1; padding: 12px; border-radius: 8px; font-weight: 700; cursor: pointer; border: none; transition: 0.2s; font-family: inherit; }
        .btn-apply { background: var(--accent); color: #000; }
        .btn-cancel { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .btn-reset { background: transparent; color: #ff4646; font-size: 0.7rem; text-decoration: underline; border: none; padding-top: 5px; }
        button:hover { filter: brightness(1.2); }
    </style>
</head>
<body>
    <div class="card">
        <div class="group"><label>Tab Title</label><input type="text" id="tabTitle"></div>
        <div class="group"><label>Favicon URL</label><input type="url" id="faviconUrl"></div>
        <div class="group"><label>Background Image URL</label><input type="url" id="bgUrl"></div>
        <div class="group">
            <label>Theme Accent Color</label>
            <div class="color-picker-wrapper" onclick="document.getElementById('themeColor').click()">
                <div class="color-box" id="colorPreview"></div>
                <div style="font-size: 0.75rem; color: #fff;" id="colorHexText">#89B4FA</div>
                <input type="color" id="themeColor">
            </div>
        </div>
        <div class="group"><label>Particle Density</label><select id="particleAmount"><option value="off">Off</option><option value="low">Low</option><option value="mid">Mid</option><option value="high">High</option></select></div>
        <div class="footer">
            <div class="btn-row">
                <button class="btn-cancel" onclick="window.parent.postMessage({type:'closeIframe'}, '*')">Cancel</button>
                <button class="btn-apply" onclick="save()">Save Settings</button>
            </div>
            <button class="btn-reset" onclick="resetDefaults()">Reset to Defaults</button>
        </div>
    </div>
    <script>
        const colorInput = document.getElementById('themeColor');
        const colorPreview = document.getElementById('colorPreview');
        const colorHexText = document.getElementById('colorHexText');

        colorInput.addEventListener('input', e => {
            colorPreview.style.backgroundColor = e.target.value;
            colorHexText.textContent = e.target.value.toUpperCase();
        });

        function save() {
            localStorage.setItem('hrn_tab_title', document.getElementById('tabTitle').value);
            localStorage.setItem('hrn_favicon_url', document.getElementById('faviconUrl').value);
            localStorage.setItem('hrn_bg_url', document.getElementById('bgUrl').value);
            localStorage.setItem('hrn_theme_color', colorInput.value);
            localStorage.setItem('hrn_particle_amount', document.getElementById('particleAmount').value);
            window.parent.postMessage({ type: 'updateSettings' }, '*');
            setTimeout(() => window.parent.postMessage({ type: 'closeIframe' }, '*'), 50);
        }

        function resetDefaults() {
            if(confirm("Alles resetten naar standaard?")) {
                localStorage.clear();
                window.parent.postMessage({ type: 'updateSettings' }, '*');
                window.parent.postMessage({ type: 'closeIframe' }, '*');
            }
        }

        window.onload = () => {
            document.getElementById('tabTitle').value = localStorage.getItem('hrn_tab_title') || "";
            document.getElementById('faviconUrl').value = localStorage.getItem('hrn_favicon_url') || "";
            document.getElementById('bgUrl').value = localStorage.getItem('hrn_bg_url') || "";
            const savedColor = localStorage.getItem('hrn_theme_color') || "#89b4fa";
            colorInput.value = savedColor;
            colorPreview.style.backgroundColor = savedColor;
            colorHexText.textContent = savedColor.toUpperCase();
            document.getElementById('particleAmount').value = localStorage.getItem('hrn_particle_amount') || "mid";
        };
    </script>
</body>
</html>
