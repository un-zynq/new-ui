<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --accent: #89b4fa;
            --bg-panel: rgba(13, 15, 23, 0.85);
            --bg-input: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.1);
        }

        body { 
            margin: 0; 
            background: #000; 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            text-transform: uppercase; 
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .pane { 
            width: 100%;
            max-width: 600px; 
            background: var(--bg-panel); 
            backdrop-filter: blur(40px); 
            border: 1px solid var(--border); 
            border-radius: 28px; 
            padding: 30px; 
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        h2 { font-size: 10px; letter-spacing: 3px; margin: 0; color: var(--accent); font-weight: 900; }

        .close { cursor: pointer; opacity: 0.5; transition: 0.3s; }
        .close:hover { opacity: 1; transform: rotate(90deg); }

        /* Grid Layout */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* Twee kolommen */
            gap: 20px;
        }

        /* Full width voor specifieke items zoals URL's */
        .full-width { grid-column: span 2; }

        .section {
            grid-column: span 2;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.05);
            margin-top: 10px;
        }

        .section-title {
            font-size: 8px;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.3);
            margin-bottom: 15px;
            display: block;
        }

        /* Inputs */
        .group { display: flex; flex-direction: column; }
        
        label { 
            font-size: 8px; 
            letter-spacing: 1.5px; 
            margin-bottom: 8px; 
            opacity: 0.5; 
            font-weight: 700; 
        }

        input[type="text"], input[type="color"] { 
            width: 100%; 
            background: var(--bg-input); 
            border: 1px solid var(--border); 
            padding: 12px; 
            border-radius: 12px; 
            color: #fff; 
            font-size: 10px; 
            outline: none; 
            box-sizing: border-box;
        }

        input[type="color"] { height: 40px; padding: 4px; cursor: pointer; }

        /* Range Slider Customization */
        input[type="range"] {
            appearance: none;
            width: 100%;
            height: 4px;
            background: var(--bg-input);
            border-radius: 5px;
            margin: 10px 0;
        }

        input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            width: 14px;
            height: 14px;
            background: #fff;
            border-radius: 50%;
            cursor: pointer;
        }

        /* Toggle */
        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-input);
            padding: 12px 15px;
            border-radius: 12px;
            border: 1px solid var(--border);
            cursor: pointer;
        }

        .switch { 
            width: 30px; height: 16px; 
            background: rgba(255,255,255,0.1); 
            border-radius: 20px; 
            position: relative; 
            transition: 0.3s; 
        }
        .switch::after { 
            content: ''; position: absolute; 
            top: 2px; left: 2px; 
            width: 12px; height: 12px; 
            background: #fff; border-radius: 50%; 
            transition: 0.3s; 
        }
        .active .switch { background: var(--accent); }
        .active .switch::after { left: 16px; }

        /* Responsive Breakpoint */
        @media (max-width: 500px) {
            .grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
            .section { grid-column: span 1; }
        }
    </style>
</head>
<body>

<div class="pane">
    <div class="header">
        <h2>System Engine v2</h2>
        <div class="close" onclick="window.parent.postMessage('close', '*')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </div>
    </div>

    <div class="grid">
        <div class="group">
            <label>Interface Title</label>
            <input type="text" id="title" placeholder="HRN | CORE">
        </div>
        <div class="group">
            <label>Accent Color</label>
            <input type="color" id="clr">
        </div>

        <div class="section">
            <span class="section-title">Particle Controls</span>
        </div>

        <div class="group">
            <div class="toggle-row" id="part-row" onclick="toggle('part')">
                <label style="margin:0; cursor:pointer;">Engine Particles</label>
                <div class="switch"></div>
            </div>
        </div>
        <div class="group">
            <label>Particle Count</label>
            <input type="range" id="int" min="0" max="400" step="10">
        </div>

        <div class="group full-width">
            <label>Global Opacity</label>
            <input type="range" id="op" min="0.1" max="1" step="0.05">
        </div>

        <div class="section">
            <span class="section-title">External Assets</span>
        </div>

        <div class="group">
            <label>Wallpaper URL</label>
            <input type="text" id="bg" placeholder="https://...">
        </div>
        <div class="group">
            <label>Favicon URL</label>
            <input type="text" id="fav" placeholder="https://...">
        </div>
    </div>
</div>

<script>
    const fields = ['title', 'clr', 'op', 'int', 'bg', 'fav'];
    const defaults = { title: 'HRN | CORE', clr: '#89b4fa', op: 0.8, int: 150, part: true, bg: '', fav: '' };

    function load() {
        fields.forEach(f => {
            const val = localStorage.getItem('hrn_' + f) || defaults[f];
            const el = document.getElementById(f);
            if(el) {
                el.value = val;
                el.oninput = () => {
                    localStorage.setItem('hrn_' + f, el.value);
                    window.parent.postMessage('sync', '*');
                };
            }
        });
        const p = localStorage.getItem('hrn_part') !== 'false';
        if(p) document.getElementById('part-row').classList.add('active');
    }

    function toggle(id) {
        const el = document.getElementById(id + '-row');
        const val = !el.classList.contains('active');
        el.classList.toggle('active');
        localStorage.setItem('hrn_' + id, val);
        window.parent.postMessage('sync', '*');
    }

    load();
</script>

</body>
</html>
