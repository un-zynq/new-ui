<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --accent: #89b4fa;
            --bg-panel: rgba(13, 15, 23, 0.45);
            --bg-input: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --ui-silver: rgba(235, 240, 255, 0.85);
        }

        * { box-sizing: border-box; }

        body { 
            margin: 0; 
            background: transparent; /* Belangrijk voor iframe over main background */
            color: var(--ui-silver); 
            font-family: 'Inter', sans-serif; 
            text-transform: uppercase; 
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .pane { 
            width: 100%;
            max-width: 580px; 
            background: var(--bg-panel); 
            backdrop-filter: blur(30px) saturate(150%); 
            -webkit-backdrop-filter: blur(30px) saturate(150%);
            border: 1px solid var(--border); 
            border-radius: 32px; 
            padding: 40px; 
            position: relative;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.5);
            animation: slideIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px;
        }

        .header-title {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        h2 { 
            font-size: 11px; 
            letter-spacing: 4px; 
            margin: 0; 
            color: var(--accent); 
            font-weight: 900; 
        }

        .subtitle {
            font-size: 8px;
            opacity: 0.4;
            letter-spacing: 1px;
        }

        .close { 
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            cursor: pointer; 
            transition: 0.4s; 
            color: #fff;
        }
        .close:hover { 
            background: rgba(255,255,255,0.1);
            transform: rotate(90deg); 
        }

        /* Grid Layout */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
        }

        .full-width { grid-column: span 2; }

        .section-divider {
            grid-column: span 2;
            height: 1px;
            background: linear-gradient(90deg, var(--border), transparent);
            margin: 10px 0;
        }

        .section-label {
            grid-column: span 2;
            font-size: 8px;
            letter-spacing: 3px;
            color: var(--accent);
            opacity: 0.6;
            margin-bottom: -10px;
        }

        /* Inputs & Groups */
        .group { display: flex; flex-direction: column; gap: 10px; }
        
        label { 
            font-size: 8px; 
            letter-spacing: 2px; 
            opacity: 0.4; 
            font-weight: 700; 
        }

        input[type="text"] { 
            width: 100%; 
            background: var(--bg-input); 
            border: 1px solid var(--border); 
            padding: 14px 18px; 
            border-radius: 14px; 
            color: #fff; 
            font-size: 10px; 
            outline: none; 
            transition: 0.3s;
            font-family: inherit;
            text-transform: uppercase;
        }

        input[type="text"]:focus {
            border-color: var(--accent);
            background: rgba(255,255,255,0.07);
        }

        /* Color Picker Reset */
        input[type="color"] { 
            -webkit-appearance: none;
            border: 1px solid var(--border);
            width: 100%;
            height: 44px;
            border-radius: 14px;
            background: var(--bg-input);
            cursor: pointer;
            padding: 4px;
        }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 10px; }

        /* Range Slider */
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: var(--bg-input);
            border-radius: 10px;
            margin: 15px 0;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: #fff;
            border: 3px solid var(--accent);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(var(--accent-rgb), 0.5);
        }

        /* Toggle Button */
        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-input);
            padding: 14px 18px;
            border-radius: 14px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: 0.3s;
        }
        .toggle-row:hover { background: rgba(255,255,255,0.06); }

        .switch { 
            width: 34px; height: 18px; 
            background: rgba(255,255,255,0.1); 
            border-radius: 20px; 
            position: relative; 
            transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .switch::after { 
            content: ''; position: absolute; 
            top: 3px; left: 3px; 
            width: 12px; height: 12px; 
            background: #fff; border-radius: 50%; 
            transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .active .switch { background: var(--accent); }
        .active .switch::after { left: 19px; }

        @media (max-width: 500px) {
            .grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
            .pane { padding: 25px; border-radius: 24px; }
        }
    </style>
</head>
<body>

<div class="pane">
    <div class="header">
        <div class="header-title">
            <h2>System Configuration</h2>
            <span class="subtitle">v2.0.4 - Core Engine</span>
        </div>
        <div class="close" onclick="window.parent.postMessage('close', '*')">
            <i data-lucide="x"></i>
        </div>
    </div>

    <div class="grid">
        <div class="group">
            <label>Interface Title</label>
            <input type="text" id="title" placeholder="HRN | CORE">
        </div>
        <div class="group">
            <label>Accent Tone</label>
            <input type="color" id="clr">
        </div>

        <div class="section-label">Atmosphere</div>
        
        <div class="group">
            <div class="toggle-row" id="part-row" onclick="toggle('part')">
                <label style="margin:0; cursor:pointer; opacity: 1;">Neural Particles</label>
                <div class="switch"></div>
            </div>
        </div>
        <div class="group">
            <label>Entity Density</label>
            <input type="range" id="int" min="0" max="400" step="10">
        </div>

        <div class="group full-width">
            <label>UI Master Opacity</label>
            <input type="range" id="op" min="0.1" max="1" step="0.05">
        </div>

        <div class="section-divider"></div>
        <div class="section-label">External Links</div>

        <div class="group">
            <label>Source Wallpaper</label>
            <input type="text" id="bg" placeholder="https://image-url.com/asset.jpg">
        </div>
        <div class="group">
            <label>System Favicon</label>
            <input type="text" id="fav" placeholder="https://icon-url.com/icon.png">
        </div>
    </div>
</div>

<script>
    lucide.createIcons();
    
    const fields = ['title', 'clr', 'op', 'int', 'bg', 'fav'];
    const defaults = { title: 'HRN | CORE', clr: '#89b4fa', op: 0.8, int: 150, part: true, bg: '', fav: '' };

    function load() {
        fields.forEach(f => {
            const val = localStorage.getItem('hrn_' + f) || defaults[f];
            const el = document.getElementById(f);
            if(el) {
                el.value = val;
                el.oninput = () => {
                    localStorage.setItem('hrn_' + f, el.value);
                    window.parent.postMessage('sync', '*');
                };
            }
        });
        
        // Toggle state laden
        const isPartEnabled = localStorage.getItem('hrn_part') !== 'false';
        if(isPartEnabled) document.getElementById('part-row').classList.add('active');
    }

    function toggle(id) {
        const el = document.getElementById(id + '-row');
        const isActive = !el.classList.contains('active');
        el.classList.toggle('active');
        localStorage.setItem('hrn_' + id, isActive);
        window.parent.postMessage('sync', '*');
    }

    // Direct laden bij opstarten
    load();
</script>

</body>
</html>
