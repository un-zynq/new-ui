<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #030508;
            --accent: #89b4fa;
            --ui-silver: rgba(235, 240, 255, 0.85); 
            --ui-border: rgba(255, 255, 255, 0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            height: 100%; width: 100%; 
            background: var(--bg); 
            color: var(--ui-silver); 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden;
            text-transform: uppercase;
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--ui-border); border-radius: 10px; }
        
        .ambient-bg { 
            position: fixed; 
            inset: -50px; 
            z-index: 1; 
            pointer-events: none; 
            background-size: cover; 
            background-position: center; 
            opacity: 0.4; 
            filter: brightness(0.4) blur(0px);
            display: none; 
        }

        .wrapper { 
            position: relative;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100dvh; 
            width: 100%; 
            padding: 40px 20px;
            z-index: 10;
        }
        .pane { 
            width: 100%;
            max-width: 500px; 
            background: rgba(13, 15, 23, 0.85); 
            backdrop-filter: blur(40px) saturate(150%); 
            -webkit-backdrop-filter: blur(40px) saturate(150%);
            border: 1px solid var(--ui-border); 
            border-radius: 32px; 
            padding: 30px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        h2 { font-size: 10px; font-weight: 900; letter-spacing: 3px; color: var(--accent); }
        .close-btn { 
            width: 38px; height: 38px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--ui-border);
            border-radius: 12px;
            color: #fff;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.2s;
        }
        .close-btn:hover { background: rgba(255,255,255,0.08); transform: scale(1.05); }

        .section { margin-bottom: 25px; }
        .section-label { 
            font-size: 8px; 
            color: var(--accent); 
            opacity: 0.6; 
            margin-bottom: 15px; 
            padding-bottom: 5px; 
            border-bottom: 1px solid var(--ui-border);
            display: block;
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full { grid-column: span 2; }
        .group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 8px; font-weight: 700; opacity: 0.4; letter-spacing: 1.5px; }

        input[type="text"] { 
            width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--ui-border); 
            padding: 12px; border-radius: 12px; color: #fff; font-size: 10px; outline: none;
            font-family: inherit; text-transform: uppercase;
        }
        input[type="color"] { 
            -webkit-appearance: none; border: 1px solid var(--ui-border);
            width: 100%; height: 42px; border-radius: 12px; background: rgba(255,255,255,0.04); cursor: pointer;
        }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 8px; }
        
        .file-input-wrapper { position: relative; }
        .file-btn { 
            width: 100%; padding: 12px; background: rgba(255,255,255,0.04); border: 1px solid var(--ui-border);
            border-radius: 12px; color: #fff; font-size: 9px; cursor: pointer; text-align: center;
        }
        #bg-file { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; }

        input[type="range"] { -webkit-appearance: none; width: 100%; height: 2px; background: rgba(255,255,255,0.1); margin: 15px 0; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: var(--accent); border-radius: 50%; cursor: pointer; box-shadow: 0 0 10px var(--accent); }

        .checkbox-row {
            display: flex; align-items: center; gap: 12px;
            background: rgba(255,255,255,0.02); padding: 12px; border-radius: 12px; border: 1px solid var(--ui-border);
        }
        input[type="checkbox"] {
            width: 18px; height: 18px; accent-color: var(--accent); cursor: pointer;
        }

        .preset-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
        .preset-btn {
            padding: 8px; background: rgba(255,255,255,0.03); border: 1px solid var(--ui-border);
            border-radius: 8px; color: #fff; font-size: 8px; cursor: pointer; transition: 0.2s;
        }
        .preset-btn:hover { background: rgba(255,255,255,0.08); border-color: var(--accent); }

        @media (max-width: 450px) { .grid { grid-template-columns: 1fr; } .full { grid-column: span 1; } }
    </style>
</head>
<body>
    <div class="ambient-bg" id="bg-layer"></div>
    <div class="wrapper">
        <div class="pane">
            <div class="header">
                <h2>SYSTEM ENGINE V3</h2>
                <div class="close-btn" onclick="window.parent.postMessage('close', '*')">
                    <i data-lucide="x"></i>
                </div>
            </div>

            <div class="section">
                <span class="section-label">Interface Appearance</span>
                <div class="grid">
                    <div class="group">
                        <label>Theme Color</label>
                        <input type="color" id="clr">
                    </div>
                    <div class="group">
                        <label>Custom Background</label>
                        <div class="file-input-wrapper">
                            <div class="file-btn" id="file-label">Upload Image</div>
                            <input type="file" id="bg-file" accept="image/*">
                        </div>
                    </div>
                </div>
            </div>

            <div class="section">
                <span class="section-label">Particle Dynamics</span>
                <div class="grid">
                    <div class="group full">
                        <div class="checkbox-row">
                            <input type="checkbox" id="part">
                            <label style="opacity: 1; margin: 0; cursor: pointer;">Enable Neural Particles</label>
                        </div>
                    </div>
                    <div class="group">
                        <label>Density Amount</label>
                        <input type="range" id="int" min="0.1" max="5.0" step="0.1">
                    </div>
                    <div class="group">
                        <label>Global Opacity</label>
                        <input type="range" id="op" min="0.1" max="1" step="0.05">
                    </div>
                </div>
            </div>

            <div class="section">
                <span class="section-label">Identity & Masking</span>
                <div class="grid">
                    <div class="group">
                        <label>Tab Title</label>
                        <input type="text" id="title" placeholder="HRN | CORE">
                    </div>
                    <div class="group">
                        <label>Favicon URL</label>
                        <input type="text" id="fav" placeholder="https://...">
                    </div>
                    <div class="group full">
                        <label>Stealth Presets</label>
                        <div class="preset-grid" id="preset-container"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const presets = [
            { name: "Default", title: "HRN | CORE", fav: "favicon.png" },
            { name: "Google", title: "Google", fav: "https://www.google.com/favicon.ico" },
            { name: "Drive", title: "My Drive - Google Drive", fav: "https://ssl.gstatic.com/docs/doclist/images/drive_2022q3_32dp.png" },
            { name: "Classroom", title: "Classes", fav: "https://www.gstatic.com/classroom/favicon.png" },
            { name: "Canvas", title: "Dashboard", fav: "https://du11hjcvhe07u.cloudfront.net/favicon.ico" }
        ];

        const fields = ['title', 'clr', 'op', 'int', 'fav'];
        const defaults = { title: 'HRN | CORE', clr: '#89b4fa', op: '0.8', int: '1.1', part: true, fav: '' };

        function updatePreview(url) {
            const bgLayer = document.getElementById('bg-layer');
            if (url && url.length > 10) {
                bgLayer.style.backgroundImage = `url(${url})`;
                bgLayer.style.display = 'block';
                document.getElementById('file-label').innerText = "Image Loaded";
            } else {
                bgLayer.style.display = 'none';
                document.getElementById('file-label').innerText = "Upload Image";
            }
        }

        function initPresets() {
            const container = document.getElementById('preset-container');
            presets.forEach(p => {
                const btn = document.createElement('button');
                btn.className = 'preset-btn';
                btn.innerText = p.name;
                btn.onclick = () => {
                    document.getElementById('title').value = p.title;
                    document.getElementById('fav').value = p.fav;
                    localStorage.setItem('hrn_title', p.title);
                    localStorage.setItem('hrn_fav', p.fav);
                    window.parent.postMessage('sync', '*');
                };
                container.appendChild(btn);
            });
        }

        function handleImage(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const base64 = e.target.result;
                localStorage.setItem('hrn_bg', base64);
                updatePreview(base64);
                window.parent.postMessage('sync', '*');
            };
            reader.readAsDataURL(file);
        }

        function load() {
            initPresets();
            updatePreview(localStorage.getItem('hrn_bg'));

            fields.forEach(f => {
                const stored = localStorage.getItem('hrn_' + f);
                const val = (stored !== null) ? stored : defaults[f];
                const el = document.getElementById(f);
                if (el) {
                    el.value = val;
                    el.oninput = () => {
                        localStorage.setItem('hrn_' + f, el.value);
                        window.parent.postMessage('sync', '*');
                    };
                }
            });

            const partCheck = document.getElementById('part');
            const pState = localStorage.getItem('hrn_part') !== 'false';
            partCheck.checked = pState;
            partCheck.onchange = () => {
                localStorage.setItem('hrn_part', partCheck.checked);
                window.parent.postMessage('sync', '*');
            };

            document.getElementById('bg-file').onchange = (e) => handleImage(e.target.files[0]);
        }

        load();
    </script>
</body>
</html>
