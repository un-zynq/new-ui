<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --bg: #050608; --card: #12141a; --border: #2d333b; --text: #9ca3af; --accent: #2563eb; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { width: 100%; max-width: 500px; background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 32px; }
        .group { margin-bottom: 20px; }
        label { display: block; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text); margin-bottom: 8px; }
        input, select { width: 100%; padding: 12px; background: #000; border: 1px solid var(--border); border-radius: 8px; color: white; outline: none; }
        input[type="color"] { height: 45px; padding: 5px; cursor: pointer; }
        .footer { margin-top: 32px; display: flex; justify-content: flex-end; }
        button { padding: 12px 24px; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <div class="group"><label>Tab Title</label><input type="text" id="tabTitle"></div>
        <div class="group"><label>Background URL</label><input type="url" id="bgUrl"></div>
        <div class="group"><label>Theme Color</label><input type="color" id="themeColor"></div>
        <div class="group">
            <label>Particles Amount</label>
            <select id="particleAmount">
                <option value="off">Disabled</option>
                <option value="low">Low (40)</option>
                <option value="mid">Medium (100)</option>
                <option value="high">High (250)</option>
            </select>
        </div>
        <div class="footer"><button onclick="save()">Save Changes</button></div>
    </div>

    <script>
        function save() {
            localStorage.setItem('hrn_tab_title', document.getElementById('tabTitle').value);
            localStorage.setItem('hrn_bg_url', document.getElementById('bgUrl').value);
            localStorage.setItem('hrn_theme_color', document.getElementById('themeColor').value);
            localStorage.setItem('hrn_particle_amount', document.getElementById('particleAmount').value);

            window.parent.postMessage({ type: 'updateSettings' }, '*');
            setTimeout(() => window.parent.postMessage({ type: 'closeIframe' }, '*'), 100);
        }

        window.onload = () => {
            document.getElementById('tabTitle').value = localStorage.getItem('hrn_tab_title') || "";
            document.getElementById('bgUrl').value = localStorage.getItem('hrn_bg_url') || "";
            document.getElementById('themeColor').value = localStorage.getItem('hrn_theme_color') || "#89b4fa";
            document.getElementById('particleAmount').value = localStorage.getItem('hrn_particle_amount') || "mid";
        };
    </script>
</body>
</html>
