<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        :root{--accent:#89b4fa;--bg:#030508;--glass:rgba(255,255,255,0.03);--border:rgba(255,255,255,0.12)}
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',-apple-system,sans-serif}
        body{background:var(--bg);color:#fff;height:100dvh;display:flex;align-items:center;justify-content:center;text-transform:uppercase;letter-spacing:1px;overflow:hidden;touch-action:none}
        
        .ambient-bg{position:fixed;inset:0;z-index:1;background-size:cover;background-position:center;filter:brightness(0.5);transition:opacity 0.5s ease}
        .overlay-dim{position:fixed;inset:0;z-index:2;background:radial-gradient(circle at center,transparent,rgba(0,0,0,0.5))}
        
        .core-pane{position:relative;z-index:10;width:92%;max-width:400px;max-height:85dvh;background:rgba(8,10,15,0.85);backdrop-filter:blur(30px) saturate(150%);-webkit-backdrop-filter:blur(30px) saturate(150%);border:1px solid var(--border);border-radius:20px;padding:20px;display:flex;flex-direction:column;gap:14px;box-shadow:0 40px 80px rgba(0,0,0,0.9);overflow-y:auto;scrollbar-width:none}
        .core-pane::-webkit-scrollbar{display:none}
        
        .nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px}
        .nav h2{font-size:10px;font-weight:900;color:var(--accent);letter-spacing:3px}
        .close-btn{cursor:pointer;font-size:18px;opacity:0.4;padding:5px}
        
        .row{width:100%}
        label{font-size:8px;font-weight:800;opacity:0.4;display:block;margin-bottom:6px;letter-spacing:1px}
        
        input[type="text"],.btn-action{width:100%;background:var(--glass);border:1px solid var(--border);padding:12px;border-radius:8px;color:#fff;font-size:10px;font-weight:700;outline:none}
        
        /* Verbeterde Grid voor mobiel */
        .flex-group{display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%;}
        
        @media (max-width: 360px) {
            .flex-group { grid-template-columns: 1fr; } /* Zet alles onder elkaar op hele kleine schermen */
        }

        .group{width: 100%; min-width: 0;} /* min-width: 0 is cruciaal voor sliders in grid */

        .btn-action{cursor:pointer; transition: 0.2s;}
        .btn-reset{background:rgba(243,139,168,0.05);border-color:rgba(243,139,168,0.2);color:#f38ba8}
        
        input[type="color"]{-webkit-appearance:none;border:1px solid var(--border);width:100%;height:38px;border-radius:8px;background:var(--glass);cursor:pointer;padding:0}
        input[type="color"]::-webkit-color-swatch-wrapper{padding:4px}
        input[type="color"]::-webkit-color-swatch{border:none;border-radius:4px}
        
        /* SLIDER FIX */
        .slider-box{background:var(--glass);padding:0 12px;border-radius:8px;border:1px solid var(--border);display:flex;align-items:center;height:38px;width:100%;}
        
        input[type="range"]{
            -webkit-appearance:none;
            width: 100% !important;
            background: transparent;
            margin: 0;
        }

        input[type="range"]:focus { outline: none; }

        /* Track styling */
        input[type="range"]::-webkit-slider-runnable-track {
            width: 100%;
            height: 2px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
        }

        /* Thumb styling - groter voor Samsung/Touch */
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            margin-top: -7px; /* (track height / 2) - (thumb height / 2) */
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        .toggle-box{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--glass);border-radius:8px;border:1px solid var(--border);cursor:pointer}
        .dot{width:8px;height:8px;border-radius:50%;background:#222;transition:0.3s}
        input:checked+.dot{background:var(--accent);box-shadow:0 0 10px var(--accent)}
        
        .chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
        .chip{padding:8px 12px;background:var(--glass);border:1px solid var(--border);border-radius:6px;font-size:8px;font-weight:800;cursor:pointer;white-space:nowrap}
        .hidden-file{display:none}
    </style>
</head>
<body>
    <div class="ambient-bg" id="bg-layer"></div>
    <div class="overlay-dim"></div>

    <div class="core-pane">
        <div class="nav">
            <h2>SETTINGS</h2>
            <div class="close-btn" onclick="window.parent.postMessage('close', '*')">×</div>
        </div>

        <div class="row">
            <div class="flex-group">
                <div class="group">
                    <label>ACCENT</label>
                    <input type="color" id="clr">
                </div>
                <div class="group">
                    <label>WALLPAPER</label>
                    <button class="btn-action" onclick="document.getElementById('bg-file').click()">UPLOAD</button>
                    <input type="file" id="bg-file" class="hidden-file" accept="image/*">
                </div>
            </div>
        </div>

        <div class="row">
            <label>REMOTE URL</label>
            <input type="text" id="bg" placeholder="PASTE IMAGE LINK...">
        </div>

        <div class="row flex-group">
            <button class="btn-action btn-reset" onclick="resetBg()">RESET BG</button>
            <button class="btn-action btn-reset" onclick="resetAll()">PURGE ALL</button>
        </div>

        <div class="row">
            <div class="toggle-box" onclick="document.getElementById('part').click()">
                <label style="margin:0; opacity:1">PARTICLES</label>
                <input type="checkbox" id="part" hidden>
                <div class="dot"></div>
            </div>
        </div>

        <div class="row flex-group">
            <div class="group">
                <label>DENSITY</label>
                <div class="slider-box"><input type="range" id="int" min="0.1" max="4.0" step="0.1"></div>
            </div>
            <div class="group">
                <label>OPACITY</label>
                <div class="slider-box"><input type="range" id="op" min="0.1" max="1" step="0.05"></div>
            </div>
        </div>

        <div class="row">
            <label>PRESETS</label>
            <div class="chips" id="p-list"></div>
        </div>

        <div class="row flex-group">
            <div class="group">
                <label>TITLE</label>
                <input type="text" id="title" placeholder="TAB">
            </div>
            <div class="group">
                <label>FAVICON</label>
                <input type="text" id="fav" placeholder="URL">
            </div>
        </div>
    </div>

    <script>
        const sync = () => window.parent.postMessage('sync', '*');
        const defaultBg = "https://img.freepik.com/free-vector/black-background-with-wavy-lines_52683-76524.jpg";
        
        const presets = [
            {n:"DEFAULT", t:"HRN | CORE", f:"/logo.svg"},
            {n:"GOOGLE", t:"Google", f:"https://google.com/favicon.ico"},
            {n:"DRIVE", t:"My Drive", f:"https://ssl.gstatic.com/docs/doclist/images/drive_2022q3_32dp.png"},
            {n:"GMAIL", t:"Inbox", f:"https://ssl.gstatic.com/ui/v1/icons/mail/images/favicon5.ico"}
        ];

        function updateBg(val) {
            const bgLayer = document.getElementById('bg-layer');
            if (!val || val.trim() === "") val = defaultBg;
            bgLayer.style.backgroundImage = `url('${val}')`;
            localStorage.setItem('hrn_bg', val);
            sync();
        }

        function resetBg() {
            updateBg(defaultBg);
            document.getElementById('bg').value = "";
        }

        const fields = ['title', 'clr', 'op', 'int', 'fav'];
        const defaults = {title:'HRN | CORE', clr:'#89b4fa', op:0.8, int:1.1, fav:''};

        const resetAll = () => {
            fields.forEach(f => {
                localStorage.removeItem('hrn_'+f);
                document.getElementById(f).value = defaults[f];
            });
            localStorage.removeItem('hrn_part');
            localStorage.removeItem('hrn_bg');
            document.getElementById('part').checked = true;
            document.getElementById('bg').value = "";
            updateBg(defaultBg);
            sync();
        };

        document.getElementById('bg-file').onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const fr = new FileReader();
            fr.onload = () => updateBg(fr.result);
            fr.readAsDataURL(file);
        };

        fields.forEach(f => {
            const el = document.getElementById(f);
            const saved = localStorage.getItem('hrn_' + f);
            el.value = saved !== null ? saved : defaults[f];
            el.oninput = () => {
                localStorage.setItem('hrn_' + f, el.value);
                sync();
            };
        });

        const partCheck = document.getElementById('part');
        partCheck.checked = localStorage.getItem('hrn_part') !== 'false';
        partCheck.onchange = () => {
            localStorage.setItem('hrn_part', partCheck.checked);
            sync();
        };

        const list = document.getElementById('p-list');
        presets.forEach(p => {
            const c = document.createElement('div');
            c.className = 'chip';
            c.innerText = p.n;
            c.onclick = () => {
                document.getElementById('title').value = p.t;
                document.getElementById('fav').value = p.f;
                localStorage.setItem('hrn_title', p.t);
                localStorage.setItem('hrn_fav', p.f);
                sync();
            };
            list.appendChild(c);
        });

        updateBg(localStorage.getItem('hrn_bg') || defaultBg);
    </script>
</body>
</html>
