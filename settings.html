<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Settings | Core</title>
    <style>
        :root {
            --accent: #89b4fa;
            --bg: #030508;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.12);
        }
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Inter', -apple-system, sans-serif;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }
        body {
            background: transparent;
            color: #fff;
            height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            letter-spacing: 1px;
            overflow: hidden;
        }
        .core-pane {
            position: relative;
            z-index: 10;
            width: 92%;
            max-width: 380px;
            max-height: 90dvh;
            background: rgba(8, 10, 15, 0.95);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8);
            overflow-y: auto;
        }
        .core-pane::-webkit-scrollbar { display: none; }
        .nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .nav h2 { font-size: 11px; font-weight: 900; color: var(--accent); letter-spacing: 3px; }
        .close-btn { cursor: pointer; font-size: 22px; opacity: 0.5; transition: 0.2s; line-height: 1; }
        .close-btn:hover { opacity: 1; transform: scale(1.1); }
        .row { width: 100%; }
        label { font-size: 9px; font-weight: 800; opacity: 0.5; display: block; margin-bottom: 8px; letter-spacing: 1px; }
        input[type="text"] {
            width: 100%; background: var(--glass); border: 1px solid var(--border);
            padding: 12px; border-radius: 10px; color: #fff; font-size: 11px;
            font-weight: 600; outline: none; transition: 0.2s;
        }
        input[type="text"]:focus { border-color: var(--accent); }
        .btn-action {
            width: 100%; background: var(--glass); border: 1px solid var(--border);
            padding: 12px; border-radius: 10px; color: #fff; font-size: 10px;
            font-weight: 800; cursor: pointer; transition: 0.2s;
        }
        .btn-action:hover { background: rgba(255, 255, 255, 0.1); border-color: var(--accent); }
        .flex-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn-reset { background: rgba(243, 139, 168, 0.05); border-color: rgba(243, 139, 168, 0.2); color: #f38ba8; }
        .btn-reset:hover { background: rgba(243, 139, 168, 0.1); border-color: #f38ba8; }
        input[type="color"] {
            -webkit-appearance: none; border: 1px solid var(--border);
            width: 100%; height: 40px; border-radius: 10px; background: var(--glass);
            cursor: pointer; padding: 4px;
        }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 6px; }
        .slider-wrap {
            width: 100%; height: 40px; background: var(--glass); border: 1px solid var(--border);
            border-radius: 10px; display: flex; align-items: center; padding: 0 15px;
            position: relative; cursor: pointer;
        }
        .slider-track { width: 100%; height: 2px; background: rgba(255, 255, 255, 0.1); position: relative; }
        .slider-fill { position: absolute; height: 100%; background: var(--accent); width: 0%; }
        .slider-knob {
            position: absolute; width: 14px; height: 14px; background: #fff;
            border-radius: 50%; left: 0%; top: 50%; transform: translate(-50%, -50%);
            box-shadow: 0 0 10px var(--accent);
        }
        .toggle-box {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px; background: var(--glass); border-radius: 10px;
            border: 1px solid var(--border); cursor: pointer; transition: 0.2s;
        }
        .toggle-box.active { border-color: var(--accent); background: rgba(137, 180, 250, 0.05); }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #222; transition: 0.3s; }
        .active .dot { background: var(--accent); box-shadow: 0 0 12px var(--accent); }
        .chips { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; }
        .chips::-webkit-scrollbar { display: none; }
        .chip {
            padding: 10px 14px; background: var(--glass); border: 1px solid var(--border);
            border-radius: 8px; font-size: 9px; font-weight: 800; cursor: pointer; transition: 0.2s;
        }
        .chip:hover { border-color: var(--accent); color: var(--accent); }
        .hidden-file { display: none; }
    </style>
</head>
<body>
    <div class="core-pane">
        <div class="nav">
            <h2>SETTINGS</h2>
            <div class="close-btn" onclick="window.parent.postMessage('close', '*')">×</div>
        </div>

        <div class="row flex-group">
            <div class="group">
                <label>ACCENT COLOR</label>
                <input type="color" id="clr">
            </div>
            <div class="group">
                <label>WALLPAPER</label>
                <button class="btn-action" onclick="document.getElementById('bg-file').click()">UPLOAD</button>
                <input type="file" id="bg-file" class="hidden-file" accept="image/*">
            </div>
        </div>

        <div class="row">
            <label>IMAGE URL</label>
            <input type="text" id="bg" placeholder="https://...">
        </div>

        <div class="row flex-group">
            <button class="btn-action btn-reset" onclick="resetBg()">RESET BG</button>
            <button class="btn-action btn-reset" onclick="resetAll()">PURGE ALL</button>
        </div>

        <div class="row">
            <div class="toggle-box" id="part-toggle">
                <label style="margin:0; opacity:1; cursor:pointer">PARTICLES ENABLED</label>
                <div class="dot"></div>
            </div>
        </div>

        <div class="row flex-group">
            <div class="group">
                <label>DENSITY</label>
                <div class="slider-wrap" id="slider-int" data-min="0.1" data-max="4.0" data-step="0.1">
                    <div class="slider-track"><div class="slider-fill"></div><div class="slider-knob"></div></div>
                </div>
            </div>
            <div class="group">
                <label>OPACITY</label>
                <div class="slider-wrap" id="slider-op" data-min="0.1" data-max="1.0" data-step="0.05">
                    <div class="slider-track"><div class="slider-fill"></div><div class="slider-knob"></div></div>
                </div>
            </div>
        </div>

        <div class="row">
            <label>PRESETS</label>
            <div class="chips" id="p-list"></div>
        </div>

        <div class="row flex-group">
            <div class="group"><label>TAB TITLE</label><input type="text" id="title"></div>
            <div class="group"><label>FAVICON URL</label><input type="text" id="fav"></div>
        </div>
    </div>

    <script>
        const sendSync = () => window.parent.postMessage('sync', '*');
        const defaultBg = "https://img.freepik.com/free-vector/black-background-with-wavy-lines_52683-76524.jpg";
        const defaults = { title: 'HRN | CORE', clr: '#89b4fa', op: '0.80', int: '1.10', fav: '', part: 'true' };

        // Helper to save and notify
        function save(key, val) {
            localStorage.setItem('hrn_' + key, val);
            sendSync();
        }

        // Slider Logic
        function initSlider(id, key) {
            const wrap = document.getElementById(id);
            const min = parseFloat(wrap.dataset.min);
            const max = parseFloat(wrap.dataset.max);
            const step = parseFloat(wrap.dataset.step);
            
            const update = (e) => {
                const rect = wrap.getBoundingClientRect();
                const clientX = (e.touches ? e.touches[0].clientX : e.clientX);
                let pos = (clientX - rect.left) / rect.width;
                pos = Math.max(0, Math.min(1, pos));
                let val = min + (pos * (max - min));
                val = Math.round(val / step) * step;
                
                renderSlider(id, val);
                save(key, val.toFixed(2));
            };

            const renderSlider = (sid, v) => {
                const w = document.getElementById(sid);
                const p = ((v - min) / (max - min)) * 100;
                w.querySelector('.slider-fill').style.width = p + '%';
                w.querySelector('.slider-knob').style.left = p + '%';
            };

            wrap.onmousedown = (e) => { update(e); window.onmousemove = update; };
            wrap.ontouchstart = (e) => { update(e); window.ontouchmove = update; };
            window.onmouseup = window.ontouchend = () => { window.onmousemove = null; window.ontouchmove = null; };

            const current = localStorage.getItem('hrn_' + key) || defaults[key];
            renderSlider(id, parseFloat(current));
        }

        // Init Sliders
        initSlider('slider-int', 'int');
        initSlider('slider-op', 'op');

        // Input Handlers
        ['title', 'clr', 'fav', 'bg'].forEach(id => {
            const el = document.getElementById(id);
            el.value = localStorage.getItem('hrn_' + id) || (id === 'bg' ? '' : defaults[id]);
            el.oninput = () => {
                if (id === 'clr') document.documentElement.style.setProperty('--accent', el.value);
                save(id, el.value);
            };
        });

        // Toggle Particles
        const partBtn = document.getElementById('part-toggle');
        let partActive = localStorage.getItem('hrn_part') !== 'false';
        partBtn.classList.toggle('active', partActive);
        partBtn.onclick = () => {
            partActive = !partActive;
            partBtn.classList.toggle('active', partActive);
            save('part', partActive);
        };

        // File Upload
        document.getElementById('bg-file').onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = () => {
                    save('bg', reader.result);
                    document.getElementById('bg').value = "LOCAL IMAGE ACTIVE";
                };
                reader.readAsDataURL(file);
            }
        };

        window.resetBg = () => {
            document.getElementById('bg').value = "";
            save('bg', defaultBg);
        };

        window.resetAll = () => {
            Object.keys(defaults).forEach(k => localStorage.removeItem('hrn_'+k));
            localStorage.removeItem('hrn_bg');
            location.reload();
            sendSync();
        };

        // Presets
        const presets = [
            { n: "DEFAULT", t: "HRN | CORE", f: "/logo.svg" },
            { n: "GOOGLE", t: "Google", f: "https://google.com/favicon.ico" },
            { n: "DISCORD", t: "Discord | Friends", f: "https://discord.com/favicon.ico" }
        ];
        const list = document.getElementById('p-list');
        presets.forEach(p => {
            const c = document.createElement('div');
            c.className = 'chip';
            c.innerText = p.n;
            c.onclick = () => {
                document.getElementById('title').value = p.t;
                document.getElementById('fav').value = p.f;
                save('title', p.t);
                save('fav', p.f);
            };
            list.appendChild(c);
        });

        // UI Initial Sync
        document.documentElement.style.setProperty('--accent', localStorage.getItem('hrn_clr') || defaults.clr);
    </script>
</body>
</html>
