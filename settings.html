<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-color: #030508;
            --accent: #89b4fa;
            --ui-silver: rgba(235, 240, 255, 0.85); 
            --ui-border: rgba(255, 255, 255, 0.1);
            --bg-panel: rgba(13, 15, 23, 0.85); /* Iets donkerder voor leesbaarheid op drukke bg */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-color); 
            color: var(--ui-silver); 
            font-family: 'Inter', sans-serif; 
            text-transform: uppercase;
            overflow: hidden;
            position: relative;
        }

        /* De Wallpaper Achtergrond (Zelfde als Main Page) */
        .ambient-bg { 
            position: fixed; 
            inset: -20px; 
            z-index: 1; 
            background-size: cover; 
            background-position: center; 
            filter: brightness(0.3) blur(10px); /* Iets minder blur dan main voor diepte effect */
            transition: 1s ease;
        }

        .pane { 
            width: 90%;
            max-width: 540px; 
            background: var(--bg-panel); 
            backdrop-filter: blur(40px) saturate(180%); 
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid var(--ui-border); 
            border-radius: 28px; 
            padding: 35px; 
            position: relative;
            z-index: 10;
            box-shadow: 0 50px 100px rgba(0,0,0,0.9);
            animation: paneEntry 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes paneEntry {
            from { opacity: 0; transform: scale(0.98) translateY(15px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .title-block h2 { 
            font-size: 10px; 
            letter-spacing: 4px; 
            color: var(--accent); 
            font-weight: 900;
        }

        .close-btn { 
            width: 40px; height: 40px;
            border-radius: 12px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--ui-border);
            color: #fff;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s;
        }
        .close-btn:hover { background: rgba(255,255,255,0.1); transform: rotate(90deg); }

        /* Grid */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .full { grid-column: span 2; }
        .group { display: flex; flex-direction: column; gap: 8px; }
        
        label { font-size: 8px; letter-spacing: 2px; opacity: 0.5; font-weight: 700; }

        input[type="text"] { 
            background: rgba(255,255,255,0.03); border: 1px solid var(--ui-border); 
            padding: 12px 15px; border-radius: 12px; color: #fff; font-size: 10px; 
            outline: none; transition: 0.3s; text-transform: uppercase;
        }
        input[type="text"]:focus { border-color: var(--accent); background: rgba(255,255,255,0.06); }

        input[type="color"] { 
            -webkit-appearance: none; border: 1px solid var(--ui-border);
            width: 100%; height: 40px; border-radius: 12px;
            background: rgba(255,255,255,0.03); cursor: pointer; padding: 4px;
        }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 8px; }

        input[type="range"] {
            -webkit-appearance: none; width: 100%; height: 2px;
            background: rgba(255,255,255,0.1); border-radius: 2px; margin: 15px 0;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 14px; height: 14px;
            background: var(--accent); border-radius: 50%; cursor: pointer;
            box-shadow: 0 0 10px var(--accent);
        }

        /* Toggle */
        .toggle-box {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(255,255,255,0.03); padding: 12px 15px;
            border-radius: 12px; border: 1px solid var(--ui-border); cursor: pointer;
        }
        .switch { width: 30px; height: 16px; background: rgba(255,255,255,0.1); border-radius: 10px; position: relative; transition: 0.3s; }
        .switch::after { content: ''; position: absolute; top: 3px; left: 3px; width: 10px; height: 10px; background: #fff; border-radius: 50%; transition: 0.3s; }
        .active .switch { background: var(--accent); }
        .active .switch::after { left: 17px; }

        .section-tag {
            grid-column: span 2; font-size: 7px; letter-spacing: 3px; 
            color: var(--accent); opacity: 0.5; margin-top: 10px;
            border-bottom: 1px solid var(--ui-border); padding-bottom: 5px;
        }

        @media (max-width: 480px) { .grid { grid-template-columns: 1fr; } .full { grid-column: span 1; } }
    </style>
</head>
<body>

<div class="ambient-bg" id="settings-bg"></div>

<div class="pane">
    <div class="header">
        <div class="title-block">
            <h2>System Engine v2</h2>
        </div>
        <div class="close-btn" onclick="window.parent.postMessage('close', '*')">
            <i data-lucide="x"></i>
        </div>
    </div>

    <div class="grid">
        <div class="group">
            <label>Interface Label</label>
            <input type="text" id="title" placeholder="HRN | CORE">
        </div>
        <div class="group">
            <label>Primary Accent</label>
            <input type="color" id="clr">
        </div>

        <div class="section-tag">Visual Engine</div>
        
        <div class="group">
            <div class="toggle-box" id="part-row" onclick="toggle('part')">
                <label style="margin:0; cursor:pointer; opacity:1;">Particles</label>
                <div class="switch"></div>
            </div>
        </div>
        <div class="group">
            <label>Particle Limit</label>
            <input type="range" id="int" min="0" max="400" step="10">
        </div>

        <div class="group full">
            <label>Global Transparency</label>
            <input type="range" id="op" min="0.1" max="1" step="0.05">
        </div>

        <div class="section-tag">Environment Assets</div>

        <div class="group">
            <label>Background URL</label>
            <input type="text" id="bg" placeholder="https://...">
        </div>
        <div class="group">
            <label>Favicon URL</label>
            <input type="text" id="fav" placeholder="https://...">
        </div>
    </div>
</div>

<script>
    lucide.createIcons();
    
    const fields = ['title', 'clr', 'op', 'int', 'bg', 'fav'];
    const defaults = { title: 'HRN | CORE', clr: '#89b4fa', op: 0.8, int: 150, part: true, bg: '', fav: '' };

    function syncBackground() {
        const bgUrl = localStorage.getItem('hrn_bg');
        if(bgUrl) {
            document.getElementById('settings-bg').style.backgroundImage = `url(${bgUrl})`;
        }
    }

    function load() {
        fields.forEach(f => {
            const val = localStorage.getItem('hrn_' + f) || defaults[f];
            const el = document.getElementById(f);
            if(el) {
                el.value = val;
                el.oninput = () => {
                    localStorage.setItem('hrn_' + f, el.value);
                    if(f === 'bg') syncBackground(); // Update bg direct in settings
                    window.parent.postMessage('sync', '*');
                };
            }
        });
        
        const isPartEnabled = localStorage.getItem('hrn_part') !== 'false';
        if(isPartEnabled) document.getElementById('part-row').classList.add('active');
        
        syncBackground();
    }

    function toggle(id) {
        const el = document.getElementById(id + '-row');
        const isActive = !el.classList.contains('active');
        el.classList.toggle('active');
        localStorage.setItem('hrn_' + id, isActive);
        window.parent.postMessage('sync', '*');
    }

    load();
</script>

</body>
</html>
