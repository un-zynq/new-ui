<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SETTINGS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --bg: #030508; --accent: #89b4fa; --text: #f0f4ff; --panel: rgba(255, 255, 255, 0.03); --border: rgba(255, 255, 255, 0.1); }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; padding: 40px 20px; text-transform: uppercase; }
        .container { max-width: 500px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        h1 { font-size: 10px; letter-spacing: 4px; color: var(--accent); }
        .close-btn { background: var(--panel); border: 1px solid var(--border); color: var(--text); padding: 8px 15px; border-radius: 10px; cursor: pointer; font-size: 9px; font-weight: 900; }
        .group { background: var(--panel); border: 1px solid var(--border); border-radius: 15px; padding: 20px; margin-bottom: 15px; }
        .label { font-size: 8px; color: rgba(255,255,255,0.4); margin-bottom: 10px; display: block; letter-spacing: 2px; }
        input[type="text"] { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border); padding: 12px; border-radius: 10px; color: white; font-size: 10px; outline: none; margin-bottom: 10px; }
        .flex { display: flex; gap: 15px; align-items: center; justify-content: space-between; }
        
        /* TOGGLE SWITCH */
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background-color: rgba(255,255,255,0.1); transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(20px); }

        .btn-save { width: 100%; background: var(--accent); color: #000; border: none; padding: 15px; border-radius: 12px; font-weight: 900; font-size: 10px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>SETTINGS.SYS</h1>
            <button class="close-btn" onclick="window.parent.postMessage('close', '*')">EXIT</button>
        </header>

        <div class="group">
            <span class="label">System Identity</span>
            <input type="text" id="sys-title" placeholder="Title">
            <input type="text" id="sys-fav" placeholder="Favicon URL">
        </div>

        <div class="group">
            <span class="label">Particles</span>
            <div class="flex">
                <span style="font-size: 10px;">Enable Particles</span>
                <label class="switch">
                    <input type="checkbox" id="sys-part">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <div class="group">
            <span class="label">Appearance</span>
            <div class="flex">
                <input type="color" id="sys-color">
                <input type="range" id="sys-opacity" min="0.1" max="1" step="0.1" style="flex:1">
            </div>
        </div>

        <div class="group">
            <span class="label">Wallpaper URL</span>
            <input type="text" id="sys-bg" placeholder="URL">
        </div>

        <button class="btn-save" onclick="save()">APPLY CHANGES</button>
    </div>

    <script>
        window.onload = () => {
            document.getElementById('sys-title').value = localStorage.getItem('hrn_title') || "";
            document.getElementById('sys-fav').value = localStorage.getItem('hrn_fav') || "";
            document.getElementById('sys-color').value = localStorage.getItem('hrn_clr') || "#89b4fa";
            document.getElementById('sys-opacity').value = localStorage.getItem('hrn_op') || "0.8";
            document.getElementById('sys-bg').value = localStorage.getItem('hrn_bg') || "";
            document.getElementById('sys-part').checked = localStorage.getItem('hrn_part') !== 'false';
        };

        function save() {
            localStorage.setItem('hrn_title', document.getElementById('sys-title').value);
            localStorage.setItem('hrn_fav', document.getElementById('sys-fav').value);
            localStorage.setItem('hrn_clr', document.getElementById('sys-color').value);
            localStorage.setItem('hrn_op', document.getElementById('sys-opacity').value);
            localStorage.setItem('hrn_bg', document.getElementById('sys-bg').value);
            localStorage.setItem('hrn_part', document.getElementById('sys-part').checked);
            window.parent.postMessage('sync', '*');
            document.querySelector('.btn-save').textContent = "DONE";
            setTimeout(() => document.querySelector('.btn-save').textContent = "APPLY CHANGES", 1000);
        }
    </script>
</body>
</html>
