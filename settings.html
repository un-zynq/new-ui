<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root{--bg:#030508;--accent:#89b4fa;--ui-silver:rgba(235,240,255,.85);--ui-border:rgba(255,255,255,.1)}*{margin:0;padding:0;box-sizing:border-box}body,html{height:100%;width:100%;background:var(--bg);color:var(--ui-silver);font-family:Inter,sans-serif;overflow:hidden;text-transform:uppercase}.ambient-bg{position:fixed;inset:-50px;z-index:1;pointer-events:none;background-size:cover;background-position:center;opacity:.4;filter:brightness(.4) blur(0);display:none}.wrapper{position:relative;display:flex;align-items:center;justify-content:center;height:100dvh;width:100%;z-index:10}.pane{width:90%;max-width:540px;background:rgba(13,15,23,.85);backdrop-filter:blur(40px) saturate(150%);-webkit-backdrop-filter:blur(40px) saturate(150%);border:1px solid var(--ui-border);border-radius:28px;padding:35px;box-shadow:0 25px 50px -12px rgba(0,0,0,.7)}.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px}h2{font-size:9px;font-weight:900;letter-spacing:3px;color:var(--accent)}.close-btn{width:40px;height:40px;background:rgba(255,255,255,.03);border:1px solid var(--ui-border);border-radius:12px;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.2s}.close-btn:hover{background:rgba(255,255,255,.08);transform:scale(1.05)}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px}.full{grid-column:span 2}.group{display:flex;flex-direction:column;gap:8px}label{font-size:8px;font-weight:700;opacity:.4;letter-spacing:2px}input[type=text]{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--ui-border);padding:12px;border-radius:12px;color:#fff;font-size:10px;outline:0}input[type=color]{-webkit-appearance:none;border:1px solid var(--ui-border);width:100%;height:40px;border-radius:12px;background:rgba(255,255,255,.04);cursor:pointer}input[type=color]::-webkit-color-swatch{border:none;border-radius:8px}input[type=range]{-webkit-appearance:none;width:100%;height:2px;background:rgba(255,255,255,.1);margin:15px 0}input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;background:var(--accent);border-radius:50%;cursor:pointer;box-shadow:0 0 10px var(--accent)}.toggle-row{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.02);padding:12px 15px;border-radius:12px;border:1px solid var(--ui-border);cursor:pointer}.switch{width:30px;height:16px;background:rgba(255,255,255,.1);border-radius:20px;position:relative;transition:.2s}.switch::after{content:'';position:absolute;top:2px;left:2px;width:12px;height:12px;background:#fff;border-radius:50%;transition:.2s}.active .switch{background:var(--accent)}.active .switch::after{left:16px}.section-label{grid-column:span 2;font-size:7px;color:var(--accent);opacity:.6;margin-top:10px;border-bottom:1px solid var(--ui-border);padding-bottom:5px}@media (max-width:500px){.grid{grid-template-columns:1fr}.full{grid-column:span 1}}
    </style>
</head>
<body>
    <div class="ambient-bg" id="bg-layer"></div>
    <div class="wrapper">
        <div class="pane">
            <div class="header">
                <h2>SYSTEM ENGINE V2</h2>
                <div class="close-btn" onclick="window.parent.postMessage('close', '*')">
                    <i data-lucide="x"></i>
                </div>
            </div>

            <div class="grid">
                <div class="group">
                    <label>Interface Title</label>
                    <input type="text" id="title" placeholder="HRN | CORE">
                </div>
                <div class="group">
                    <label>Accent Color</label>
                    <input type="color" id="clr">
                </div>

                <div class="section-label">Engine Config</div>
                <div class="group">
                    <div class="toggle-row" id="part-row" onclick="toggle('part')">
                        <label style="margin:0; cursor:pointer; opacity:1;">Neural Particles</label>
                        <div class="switch"></div>
                    </div>
                </div>
                <div class="group">
                    <label>Density (per 100px)</label>
                    <input type="range" id="int" min="0.1" max="5.0" step="0.1">
                </div>

                <div class="group full">
                    <label>Interface Opacity</label>
                    <input type="range" id="op" min="0.1" max="1" step="0.05">
                </div>

                <div class="section-label">Assets</div>
                <div class="group">
                    <label>Wallpaper (URL)</label>
                    <input type="text" id="bg" placeholder="https://...">
                </div>
                <div class="group">
                    <label>Favicon (URL)</label>
                    <input type="text" id="fav" placeholder="https://...">
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const fields = ['title', 'clr', 'op', 'int', 'bg', 'fav'];
        const defaults = { title: 'HRN | CORE', clr: '#89b4fa', op: 0.8, int: 1.1, part: true, bg: '', fav: '' };

        function updateBg(url) {
            const bgLayer = document.getElementById('bg-layer');
            if (url && url.length > 5) {
                bgLayer.style.backgroundImage = `url(${url})`;
                bgLayer.style.display = 'block';
            } else {
                bgLayer.style.display = 'none';
            }
        }

        function load() {
            updateBg(localStorage.getItem('hrn_bg'));

            fields.forEach(f => {
                const stored = localStorage.getItem('hrn_' + f);
                const val = (stored !== null) ? stored : defaults[f];
                const el = document.getElementById(f);
                
                if(el) {
                    el.value = val;
                    el.oninput = () => {
                        localStorage.setItem('hrn_' + f, el.value);
                        if(f === 'bg') updateBg(el.value);
                        window.parent.postMessage('sync', '*');
                    };
                }
            });

            const p = localStorage.getItem('hrn_part') !== 'false';
            if(p) document.getElementById('part-row').classList.add('active');
        }

        function toggle(id) {
            const el = document.getElementById(id + '-row');
            const val = !el.classList.contains('active');
            el.classList.toggle('active');
            localStorage.setItem('hrn_' + id, val);
            window.parent.postMessage('sync', '*');
        }

        load();
    </script>
</body>
</html>
