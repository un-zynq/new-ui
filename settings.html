<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #030508;
            --accent: #89b4fa;
            --accent-rgb: 137, 180, 250;
            --ui-silver: rgba(235, 240, 255, 0.85); 
            --ui-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body { 
            height: 100%; 
            width: 100%; 
            background: var(--bg); 
            color: var(--ui-silver); 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; 
            text-transform: uppercase; 
        }

        /* EXACTE BACKDROP STYLING VAN MAIN PAGE */
        .ambient-bg { 
            position: fixed; 
            inset: -50px; 
            z-index: 1; 
            pointer-events: none; 
            background-size: cover; 
            background-position: center; 
            opacity: 0; 
            filter: brightness(0.3) blur(40px); 
            transition: 2.5s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .ambient-bg.loaded { opacity: 0.4; filter: brightness(0.4) blur(0px); }

        /* WRAPPER VOOR EXACTE SCALING EN ANIMATIE */
        .wrapper { 
            position: relative; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100dvh; 
            width: 100%; 
            z-index: 10; 
            opacity: 0; 
            transform: scale(1.02); 
            transition: 1.5s cubic-bezier(0.16, 1, 0.3, 1); 
        }
        .wrapper.active { opacity: 1; transform: scale(1); }

        .pane { 
            width: 90%;
            max-width: 540px; 
            background: rgba(13, 15, 23, 0.45); /* Glass effect */
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--ui-border); 
            border-radius: 24px; 
            padding: 35px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        h2 { font-size: 9px; font-weight: 900; letter-spacing: 2.5px; color: var(--accent); }

        .close-btn { 
            width: 40px; height: 40px;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--ui-border);
            border-radius: 14px;
            color: var(--ui-silver);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.4s ease;
        }
        .close-btn:hover { background: rgba(255,255,255,0.08); transform: scale(1.08); color: #fff; }

        /* Grid Layout */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .full { grid-column: span 2; }
        .section-label { grid-column: span 2; font-size: 8px; letter-spacing: 2px; color: rgba(255,255,255,0.3); margin-top: 10px; }

        /* Inputs & Controls */
        .group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 8px; font-weight: 700; opacity: 0.5; letter-spacing: 1.5px; }

        input[type="text"] { 
            width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--ui-border); 
            padding: 12px; border-radius: 12px; color: #fff; font-size: 10px; outline: none; transition: 0.3s;
        }
        input[type="text"]:focus { border-color: var(--accent); }

        input[type="color"] { 
            -webkit-appearance: none; border: 1px solid var(--ui-border);
            width: 100%; height: 40px; border-radius: 12px; background: transparent; cursor: pointer;
        }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 8px; }

        input[type="range"] {
            -webkit-appearance: none; width: 100%; height: 2px; background: var(--ui-border); margin: 15px 0;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 14px; height: 14px; background: var(--accent); border-radius: 50%; cursor: pointer;
            box-shadow: 0 0 15px var(--accent);
        }

        .toggle-row {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(255,255,255,0.02); padding: 12px 15px; border-radius: 12px; border: 1px solid var(--ui-border); cursor: pointer;
        }
        .switch { width: 30px; height: 16px; background: rgba(255,255,255,0.1); border-radius: 20px; position: relative; transition: 0.3s; }
        .switch::after { content: ''; position: absolute; top: 2px; left: 2px; width: 12px; height: 12px; background: #fff; border-radius: 50%; transition: 0.3s; }
        .active .switch { background: var(--accent); }
        .active .switch::after { left: 16px; }

        @media (max-width: 500px) { .grid { grid-template-columns: 1fr; } .full { grid-column: span 1; } }
    </style>
</head>
<body>

    <div class="ambient-bg" id="bg-layer"></div>

    <div class="wrapper" id="settings-wrapper">
        <div class="pane">
            <div class="header">
                <h2>SYSTEM ENGINE V2</h2>
                <div class="close-btn" onclick="window.parent.postMessage('close', '*')">
                    <i data-lucide="x"></i>
                </div>
            </div>

            <div class="grid">
                <div class="group">
                    <label>Interface Title</label>
                    <input type="text" id="title" placeholder="HRN | CORE">
                </div>
                <div class="group">
                    <label>Accent Color</label>
                    <input type="color" id="clr">
                </div>

                <div class="section-label">Particle Controls</div>
                <div class="group">
                    <div class="toggle-row" id="part-row" onclick="toggle('part')">
                        <label style="margin:0; cursor:pointer; opacity: 1;">Engine Particles</label>
                        <div class="switch"></div>
                    </div>
                </div>
                <div class="group">
                    <label>Particle Count</label>
                    <input type="range" id="int" min="0" max="400" step="10">
                </div>

                <div class="group full">
                    <label>Global Opacity</label>
                    <input type="range" id="op" min="0.1" max="1" step="0.05">
                </div>

                <div class="section-label">External Assets</div>
                <div class="group">
                    <label>Wallpaper URL</label>
                    <input type="text" id="bg" placeholder="https://...">
                </div>
                <div class="group">
                    <label>Favicon URL</label>
                    <input type="text" id="fav" placeholder="https://...">
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const fields = ['title', 'clr', 'op', 'int', 'bg', 'fav'];
        const defaults = { title: 'HRN | CORE', clr: '#89b4fa', op: 0.8, int: 150, part: true, bg: '', fav: '' };

        function load() {
            // Pas de achtergrond aan aan de opgeslagen wallpaper
            const savedBg = localStorage.getItem('hrn_bg');
            if(savedBg) {
                const bgLayer = document.getElementById('bg-layer');
                bgLayer.style.backgroundImage = `url(${savedBg})`;
                // Timing matcht met main page loader
                setTimeout(() => bgLayer.classList.add('loaded'), 100);
            }

            fields.forEach(f => {
                const val = localStorage.getItem('hrn_' + f) || defaults[f];
                const el = document.getElementById(f);
                if(el) {
                    el.value = val;
                    el.oninput = () => {
                        localStorage.setItem('hrn_' + f, el.value);
                        if(f === 'bg') {
                            document.getElementById('bg-layer').style.backgroundImage = `url(${el.value})`;
                        }
                        window.parent.postMessage('sync', '*');
                    };
                }
            });

            const p = localStorage.getItem('hrn_part') !== 'false';
            if(p) document.getElementById('part-row').classList.add('active');

            // Intro animatie exact zoals main wrapper
            setTimeout(() => {
                document.getElementById('settings-wrapper').classList.add('active');
            }, 100);
        }

        function toggle(id) {
            const el = document.getElementById(id + '-row');
            const val = !el.classList.contains('active');
            el.classList.toggle('active');
            localStorage.setItem('hrn_' + id, val);
            window.parent.postMessage('sync', '*');
        }

        load();
    </script>
</body>
</html>
