<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <base href="https://un-zynq.github.io/">
    <title>HRN | Games</title>
    <link rel="icon" type="image/png" href="/logo.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        /* Voor body en alle elementen */
* {
  scrollbar-width: none; /* Firefox */
  -ms-overflow-style: none; /* IE 10+ */
}

*::-webkit-scrollbar {
  display: none; /* Chrome, Safari, Edge */
}
        :root {
            --bg: #030508;
            --bg-card: rgba(12, 16, 24, 0.85);
            --border: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(137, 180, 250, 0.3);
            --text: rgba(235, 240, 255, 0.95);
            --text-muted: rgba(235, 240, 255, 0.5);
            --text-dim: rgba(235, 240, 255, 0.25);
            --accent: #89b4fa;
            --accent-soft: rgba(137, 180, 250, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            text-transform: uppercase;
        }

        /* --- Background Effects (No Blur) --- */
        #webgl-canvas {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        .ambient-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background-size: cover;
            background-position: center;
            opacity: 0;
            filter: brightness(0.6);
            transition: 2.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .ambient-bg.loaded { opacity: 1; }

        .overlay-dim {
            position: fixed;
            inset: 0;
            z-index: 1;
            background: rgba(3, 5, 8, 0.7);
            pointer-events: none;
        }

        /* --- Loading --- */
        #loader {
            position: fixed;
            inset: 0;
            z-index: 10000;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s, visibility 0.8s;
        }
        .load-line { width: 180px; height: 2px; background: rgba(255, 255, 255, 0.05); border-radius: 10px; overflow: hidden; }
        #progress { height: 100%; width: 0; background: var(--accent); transition: width 0.4s; box-shadow: 0 0 15px var(--accent); }

        /* --- Container --- */
        #app {
            position: relative;
            z-index: 10;
            max-width: 900px;
            margin: 0 auto;
            padding: 0 24px 80px;
            opacity: 0;
            transform: translateY(10px);
            transition: 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        #app.active { opacity: 1; transform: translateY(0); }

        /* --- Header --- */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 20px 0 16px;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            margin-bottom: 24px;
        }

        .header-row {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 16px;
        }

        .back-btn {
            width: 42px;
            height: 42px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .back-btn:hover { background: var(--accent-soft); border-color: var(--accent); }
        .back-btn svg { width: 18px; height: 18px; }

        .search-wrapper { flex: 1; position: relative; }
        
        .search-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 16px 12px 44px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1.5px;
            color: var(--text);
            font-family: inherit;
            outline: none;
            transition: all 0.2s;
        }
        .search-input::placeholder { color: var(--text-dim); }
        .search-input:focus { border-color: var(--accent); background: rgba(0, 0, 0, 0.5); }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            pointer-events: none;
        }

        /* --- Tabs --- */
        .tabs-wrapper {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 4px;
            scrollbar-width: none;
        }
        .tabs-wrapper::-webkit-scrollbar { display: none; }

        .tab {
            background: transparent;
            border: 1px solid transparent;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
            font-family: inherit;
        }
        .tab:hover { color: var(--text); background: rgba(255,255,255,0.03); }
        .tab.active {
            background: var(--accent-soft);
            border-color: var(--border);
            color: var(--accent);
        }

        /* --- List --- */
        .count-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 3px;
            color: var(--text-muted);
            margin-bottom: 16px;
            padding-left: 2px;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 10px;
        }

        .game-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 18px;
            text-decoration: none;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 14px;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .game-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--accent);
            transform: scaleY(0);
            transition: transform 0.2s;
        }
        
        .game-card:hover {
            border-color: var(--border-hover);
            transform: translateY(-2px);
            background: rgba(20, 25, 35, 0.9);
        }
        .game-card:hover::before { transform: scaleY(1); }
        .game-card:active { transform: translateY(0); }

        .game-emoji {
            font-size: 18px;
            transition: transform 0.2s;
        }
        .game-card:hover .game-emoji { transform: scale(1.2); }

        .game-title {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-dim);
            font-size: 11px;
            letter-spacing: 2px;
            grid-column: 1 / -1;
        }

        /* --- Responsive --- */
        @media (max-width: 600px) {
            #app { padding: 0 16px 60px; }
            .header { padding: 16px 0; }
            .games-grid { grid-template-columns: 1fr; }
            .header-row { margin-bottom: 12px; }
        }
    </style>
</head>
<body>
    <div id="loader"><div class="load-line"><div id="progress"></div></div></div>

    <div class="ambient-bg" id="bg"></div>
    <div class="overlay-dim"></div>
    <canvas id="webgl-canvas"></canvas>

    <div id="app">
        <div class="header">
            <div class="header-row">
                <button class="back-btn" onclick="window.parent.postMessage('close', '*')">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="m15 18-6-6 6-6"/>
                    </svg>
                </button>
                <div class="search-wrapper">
                    <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.3-4.3"></path>
                    </svg>
                    <input type="text" class="search-input" id="search" placeholder="Search..." autocomplete="off">
                </div>
            </div>
            <div class="tabs-wrapper" id="tabs-container"></div>
        </div>

        <div class="count-label" id="count">Loading...</div>
        <div class="games-grid" id="grid"></div>
    </div>

    <script id="vs" type="x-shader/x-vertex">
        attribute vec2 a_pos;attribute float a_size;attribute float a_op;uniform vec2 u_res;uniform float u_time;varying float v_op;
        void main(){vec2 zeroToOne=a_pos/u_res;vec2 clipSpace=(zeroToOne*2.0)-1.0;gl_Position=vec4(clipSpace*vec2(1.0,-1.0),0.0,1.0);float pulse=0.85+(sin(u_time*1.5+a_op*10.0)*0.15);gl_PointSize=a_size*1.5*pulse;v_op=a_op;}
    </script>
    <script id="fs" type="x-shader/x-fragment">
        precision mediump float;uniform vec3 u_color;varying float v_op;
        void main(){float dist=distance(gl_PointCoord,vec2(0.5));if(dist>0.5)discard;gl_FragColor=vec4(u_color,(v_op*1.3)*(1.0-dist*2.0));}
    </script>

    <script type="module">
        const CATEGORIES = {
            all: { name: 'All' },
            popular: { name: 'Hot', games: ['subway-surfers', 'slope', 'temple-run-2', 'bitlife', 'stickman-hook', 'minecraft-classic', '1v1-lol'] },
            action: { name: 'Action', games: ['bullet-force', 'gun-mayhem', '1v1-lol', 'masked-forces', 'smash-karts', 'bacon-may-die', 'iron-snout', 'worlds-hardest-game', 'getaway-shootout', 'rooftop-snipers'] },
            racing: { name: 'Racing', games: ['drift-hunters', 'moto-x3m', 'slope', 'madalin-stunt-cars-2', 'retro-bowl', 'cluster-rush', 'drift-boss', 'drive-mad', 'eggy-car', 'snow-rider-3d'] },
            idle: { name: 'Idle', games: ['cookie-clicker', 'capybara-clicker', 'clicker-heroes', 'idle-breakout', 'dogeminer', 'idle-mining'] },
            puzzle: { name: 'Puzzle', games: ['2048', 'cut-the-rope', 'bloxorz', 'minesweeper', 'wordle', 'ball-sort-puzzle'] },
            casual: { name: 'Casual', games: ['among-us', 'flappy-bird', 'doodle-jump', 'fruit-ninja', 'paper-io-2', 'hole-io', 'basket-random', 'tetris'] },
            adventure: { name: 'Adventure', games: ['minecraft-classic', 'paper-minecraft', 'terraria', 'pokemon-emerald', 'mario', 'super-mario-64', 'subway-surfers', 'vex-7', 'ovo'] },
            classic: { name: 'Classic', games: ['pacman', 'galaga', 'snake', 'google-feud', 'impossible-quiz', 'fnaf'] }
        };

        const EMOJIS = ['🎮', '🕹️', '👾', '🚀', '⚡', '🔥', '💎', '🌟', '🎲', '🎯', '🏆', '💥', '✨', '🔷', '🟣', '🟢'];
        const defaultBg = "https://img.freepik.com/free-vector/black-background-with-wavy-lines_52683-76524.jpg";

        const grid = document.getElementById('grid');
        const countEl = document.getElementById('count');
        const searchInput = document.getElementById('search');
        const tabsContainer = document.getElementById('tabs-container');
        const bgLayer = document.getElementById('bg');
        const app = document.getElementById('app');
        const canvas = document.getElementById('webgl-canvas');
        const gl = canvas.getContext('webgl', { antialias: true, alpha: true });

        let allGames = [];
        let currentCategory = 'all';
        let particles = [], pAmount = 0, program, posAttr, sizeAttr, opAttr, resUni, colUni, timeUni, posBuffer, sizeBuffer, opBuffer, startTime = Date.now();

        function createShader(gl, type, source) { const s = gl.createShader(type); gl.shaderSource(s, source); gl.compileShader(s); return s; }

        function initGL() {
            if (!gl) return;
            const vS = createShader(gl, gl.VERTEX_SHADER, document.getElementById('vs').textContent);
            const fS = createShader(gl, gl.FRAGMENT_SHADER, document.getElementById('fs').textContent);
            program = gl.createProgram(); gl.attachShader(program, vS); gl.attachShader(program, fS); gl.linkProgram(program); gl.useProgram(program);
            posAttr = gl.getAttribLocation(program, "a_pos"); sizeAttr = gl.getAttribLocation(program, "a_size"); opAttr = gl.getAttribLocation(program, "a_op");
            resUni = gl.getUniformLocation(program, "u_res"); colUni = gl.getUniformLocation(program, "u_color"); timeUni = gl.getUniformLocation(program, "u_time");
            posBuffer = gl.createBuffer(); sizeBuffer = gl.createBuffer(); opBuffer = gl.createBuffer();
            gl.enable(gl.BLEND); gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
        }

        function applySettings() {
            const c = localStorage.getItem('hrn_clr') || "#89b4fa";
            const o = parseFloat(localStorage.getItem('hrn_op')) || 0.8;
            const density = parseFloat(localStorage.getItem('hrn_int')) || 1.1;
            const area = (window.innerWidth * window.innerHeight) / 10000;
            const newpAmount = Math.floor(area * density);
            const pEnabled = localStorage.getItem('hrn_part') !== 'false';
            const r = parseInt(c.slice(1, 3), 16) / 255, g = parseInt(c.slice(3, 5), 16) / 255, b = parseInt(c.slice(5, 7), 16) / 255;
            if (program && gl) gl.uniform3f(colUni, r, g, b);
            document.documentElement.style.setProperty('--accent', c);
            if (!pEnabled) { pAmount = 0; return; }
            if (pAmount !== newpAmount) { particles = []; pAmount = newpAmount; for (let i = 0; i < pAmount; i++) particles.push({ x: Math.random() * window.innerWidth, y: Math.random() * window.innerHeight, s: Math.random() * 4 + 2.5, vx: (Math.random() - 0.5) * 0.4, vy: (Math.random() - 0.5) * 0.4, o: o * (Math.random() * 0.5 + 0.5) }); }
            bgLayer.style.backgroundImage = `url('${localStorage.getItem('hrn_bg') || defaultBg}')`; bgLayer.classList.add('loaded');
        }

        function render() {
            if (!gl || !program || pAmount === 0) { if (gl) gl.clear(gl.COLOR_BUFFER_BIT); requestAnimationFrame(render); return; }
            const elapsed = (Date.now() - startTime) / 1000;
            const posData = new Float32Array(pAmount * 2), sizeData = new Float32Array(pAmount), opData = new Float32Array(pAmount);
            for (let i = 0; i < pAmount; i++) { const p = particles[i]; p.x += p.vx; p.y += p.vy; if (p.x < 0) p.x = window.innerWidth; if (p.x > window.innerWidth) p.x = 0; if (p.y < 0) p.y = window.innerHeight; if (p.y > window.innerHeight) p.y = 0; posData[i * 2] = p.x; posData[i * 2 + 1] = p.y; sizeData[i] = p.s; opData[i] = p.o; }
            gl.clear(gl.COLOR_BUFFER_BIT); gl.useProgram(program); gl.uniform2f(resUni, window.innerWidth, window.innerHeight); gl.uniform1f(timeUni, elapsed);
            gl.bindBuffer(gl.ARRAY_BUFFER, posBuffer); gl.bufferData(gl.ARRAY_BUFFER, posData, gl.DYNAMIC_DRAW); gl.enableVertexAttribArray(posAttr); gl.vertexAttribPointer(posAttr, 2, gl.FLOAT, false, 0, 0);
            gl.bindBuffer(gl.ARRAY_BUFFER, sizeBuffer); gl.bufferData(gl.ARRAY_BUFFER, sizeData, gl.DYNAMIC_DRAW); gl.enableVertexAttribArray(sizeAttr); gl.vertexAttribPointer(sizeAttr, 1, gl.FLOAT, false, 0, 0);
            gl.bindBuffer(gl.ARRAY_BUFFER, opBuffer); gl.bufferData(gl.ARRAY_BUFFER, opData, gl.DYNAMIC_DRAW); gl.enableVertexAttribArray(opAttr); gl.vertexAttribPointer(opAttr, 1, gl.FLOAT, false, 0, 0);
            gl.drawArrays(gl.POINTS, 0, pAmount); requestAnimationFrame(render);
        }

        function formatName(id) { return id.replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase()); }
        function getEmoji(id) { let hash = 0; for (let i = 0; i < id.length; i++) hash = id.charCodeAt(i) + ((hash << 5) - hash); return EMOJIS[Math.abs(hash) % EMOJIS.length]; }

        function getFilteredGames() {
            let list = allGames;
            if (currentCategory !== 'all' && CATEGORIES[currentCategory]?.games) {
                list = CATEGORIES[currentCategory].games.filter(g => allGames.includes(g));
            }
            return list;
        }

        function renderTabs() {
            tabsContainer.innerHTML = '';
            Object.keys(CATEGORIES).forEach(key => {
                const cat = CATEGORIES[key];
                const btn = document.createElement('button');
                btn.className = `tab ${currentCategory === key ? 'active' : ''}`;
                btn.textContent = cat.name;
                btn.onclick = () => {
                    currentCategory = key;
                    renderTabs();
                    handleRender();
                };
                tabsContainer.appendChild(btn);
            });
        }

        function handleRender() {
            const query = searchInput.value.toLowerCase().trim();
            let baseGames = getFilteredGames();
            let games = query ? baseGames.filter(g => formatName(g).toLowerCase().includes(query)) : baseGames;
            renderGames(games);
        }

        function renderGames(games) {
            if (!games.length) { grid.innerHTML = '<div class="empty-state">No games found</div>'; countEl.textContent = '0 titles'; return; }
            countEl.textContent = `${games.length} titles`;
            grid.innerHTML = games.map(g => `<a href="./game/${g}" class="game-card"><span class="game-emoji">${getEmoji(g)}</span><span class="game-title">${formatName(g)}</span></a>`).join('');
        }

        async function init() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            if (gl) gl.viewport(0, 0, canvas.width, canvas.height);
            initGL(); applySettings(); render();
            const progress = document.getElementById('progress'); progress.style.width = '30%';
            try { const res = await fetch('/games.json'); const data = await res.json(); allGames = Object.values(data).flat(); progress.style.width = '100%'; } catch (e) { console.error(e); }
            renderTabs();
            handleRender();
            setTimeout(() => { document.getElementById('loader').style.opacity = '0'; setTimeout(() => { document.getElementById('loader').style.display = 'none'; app.classList.add('active'); }, 600); }, 400);
        }

        searchInput.addEventListener('input', handleRender);
        window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; if (gl) gl.viewport(0, 0, canvas.width, canvas.height); applySettings(); };
        window.addEventListener('storage', applySettings);
        init();
    </script>
</body>
</html>
