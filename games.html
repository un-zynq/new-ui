<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #030508;
            --accent: #89b4fa;
            --ui-silver: rgba(235, 240, 255, .85);
            --ui-border: rgba(255, 255, 255, .1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: transparent;
            color: var(--ui-silver);
            font-family: Inter, sans-serif;
            text-transform: uppercase;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        /* Scrollbar styling passend bij HRN */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--ui-border); border-radius: 10px; }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            opacity: 0;
            transform: translateY(20px);
            transition: 1s cubic-bezier(.16, 1, .3, 1);
        }

        .container.active {
            opacity: 1;
            transform: translateY(0);
        }

        .header-box {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 40px;
            padding: 0 10px;
        }

        .title {
            font-size: 10px;
            font-weight: 900;
            letter-spacing: 5px;
            color: var(--accent);
        }

        .close-btn {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: rgba(0, 0, 0, .4);
            border: 1px solid var(--ui-border);
            color: var(--ui-silver);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: .3s cubic-bezier(.16, 1, .3, 1);
            backdrop-filter: blur(12px);
        }

        .close-btn:hover {
            border-color: rgba(255, 255, 255, .3);
            transform: scale(1.05);
            color: #fff;
        }

        /* Game Grid */
        #games-grid {
            display: grid;
            gap: 20px;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        }

        @media (min-width: 901px) {
            #games-grid { grid-template-columns: repeat(5, 1fr); }
        }

        .game-card {
            position: relative;
            aspect-ratio: 16/10;
            background: rgba(0, 0, 0, .4);
            border: 1px solid var(--ui-border);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: .4s cubic-bezier(.16, 1, .3, 1);
            backdrop-filter: blur(10px);
        }

        .game-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: var(--accent);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
        }

        .game-img {
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0.6;
            transition: .6s ease;
        }

        .game-card:hover .game-img {
            opacity: 0.9;
            transform: scale(1.1);
        }

        .game-info {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 15px;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            text-align: center;
        }

        .game-name {
            font-size: 9px;
            font-weight: 900;
            letter-spacing: 2px;
            color: #fff;
        }

    </style>
</head>
<body>

    <div class="container" id="main-container">
        <div class="header-box">
            <div class="title">AVAILABLE ENTITIES</div>
            <div class="close-btn" onclick="window.parent.postMessage('close', '*')">
                <i data-lucide="x"></i>
            </div>
        </div>

        <div id="games-grid">
            </div>
    </div>

    <script>
        // Init Lucide
        lucide.createIcons();

        // Consistent accent color vanuit localStorage
        const accent = localStorage.getItem('hrn_clr') || "#89b4fa";
        document.documentElement.style.setProperty('--accent', accent);

        async function fetchGames() {
            const grid = document.getElementById('games-grid');
            try {
                const response = await fetch('https://un-zynq.github.io/games2.json');
                const data = await response.json();
                
                grid.innerHTML = '';

                // Loop door de array met objecten (g1, g2, etc.)
                data.forEach(groupWrapper => {
                    const groupKey = Object.keys(groupWrapper)[0];
                    const games = groupWrapper[groupKey];

                    Object.values(games).forEach(game => {
                        const card = document.createElement('div');
                        card.className = 'game-card';
                        
                        // Placeholder image met naam van de game
                        const thumb = `https://placehold.co/400x250/030508/89b4fa?text=${encodeURIComponent(game.name)}`;
                        
                        card.innerHTML = `
                            <div class="game-img" style="background-image: url('${thumb}')"></div>
                            <div class="game-info">
                                <div class="game-name">${game.name}</div>
                            </div>
                        `;

                        card.onclick = () => {
                            window.parent.location.href = `/game/${game.alias}`;
                        };

                        grid.appendChild(card);
                    });
                });

                // Laat de container zien na het laden
                document.getElementById('main-container').classList.add('active');

            } catch (error) {
                grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; font-size: 10px; opacity: 0.5;">FAILED TO SYNC DATA</div>`;
                console.error(error);
            }
        }

        window.onload = fetchGames;
    </script>
</body>
</html>
