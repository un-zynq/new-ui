<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="dynamic-title">HRN</title>
    <link id="app-favicon" rel="icon" type="image/png" href="/logo.svg?v=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root{--bg:#030508;--accent:#89b4fa;--accent-rgb:137,180,250;--ui-silver:rgba(235,240,255,.85);--ui-border:rgba(255,255,255,.1)}
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        html,body{height:100%;width:100%;background:var(--bg);color:var(--ui-silver);font-family:Inter,sans-serif;overflow:hidden;text-transform:uppercase}
        
        #webgl-canvas{position:fixed;inset:0;z-index:2;pointer-events:none}

        /* --- BG UNBLUR ANIMATION --- */
        .ambient-bg {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0;
            /* Start-staat: Blur + iets kleiner voor diepte effect */
            filter: brightness(.7) blur(20px);
            transform: scale(1.1);
            transition: opacity 2s ease-out, filter 2.5s cubic-bezier(0.16, 1, 0.3, 1), transform 2.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .ambient-bg.loaded {
            opacity: 1;
            filter: brightness(.6) blur(0px); /* De uiteindelijke focus */
            transform: scale(1);
        }

        .overlay-dim{position:fixed;inset:0;z-index:1;background:rgba(0,0,0,.2);pointer-events:none}
        
        #loader{position:fixed;inset:0;z-index:10000;background:var(--bg);display:flex;align-items:center;justify-content:center;transition:opacity .8s cubic-bezier(.4,0,.2,1),visibility .8s}
        .load-line{width:220px;height:2px;background:rgba(255,255,255,.05);position:relative;overflow:hidden;border-radius:10px}
        #progress{position:absolute;height:100%;width:0;background:var(--accent);transition:width .6s cubic-bezier(.22,1,.36,1);box-shadow:0 0 15px var(--accent)}

        .wrapper{position:relative;display:flex;flex-direction:column;height:100dvh;width:100%;z-index:10;opacity:0;transform:scale(1.02);transition:1.5s cubic-bezier(.16,1,.3,1)}
        .wrapper.active{opacity:1;transform:scale(1)}
        
        .header{position:absolute;top:38px;width:100%;display:flex;justify-content:center;z-index:100}
        .status-pill{background:rgba(0,0,0,.4);border:1px solid var(--ui-border);padding:11px 28px;border-radius:100px;backdrop-filter:blur(12px);font-size:9px;font-weight:900;letter-spacing:2.5px;display:flex;gap:28px;color:var(--ui-silver)}
        
        .brand{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;width:100%;display:flex;flex-direction:column;align-items:center;gap:35px}
        .logo{font-size:clamp(5.5rem,22vw,11.5rem);font-weight:900;letter-spacing:-.06em;line-height:.7;background:linear-gradient(180deg,#fff 50%,var(--accent) 150%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;opacity:.6}
        .tagline{font-size:10px;font-weight:600;letter-spacing:9px;color:#fff;margin-top:0;opacity:0;transform:translateY(15px);transition:1.5s cubic-bezier(.16,1,.3,1) .5s;text-shadow:0 2px 15px rgba(0,0,0,.8);line-height:1.2;max-width:75%}
        .tagline.show{opacity:.9;transform:translateY(0)}

        .side-nav{position:absolute;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:20px;padding:0 55px;z-index:20;transition:1.2s cubic-bezier(.16,1,.3,1)}
        .nav-left{left:-150px;opacity:0}
        .nav-right{right:-150px;opacity:0}
        .wrapper.active .nav-left{left:0;opacity:1}
        .wrapper.active .nav-right{right:0;opacity:1}

        .mobile-nav,.bottom-nav{display:none;pointer-events:all;justify-content:center}
        .mobile-nav{gap:15px;margin-top:5px}
        .bottom-nav{gap:18px;margin-top:40px;flex-wrap:wrap}
        .bottom-nav.show{display:flex}

        .btn{width:58px;height:58px;border-radius:18px;background:rgba(0,0,0,.4);border:1px solid var(--ui-border);color:var(--ui-silver);opacity:.85;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.4s cubic-bezier(.16,1,.3,1);backdrop-filter:blur(12px)}
        .btn svg{width:22px;height:22px;stroke-width:1.8px}
        .btn:active{transform:scale(.96)}
        .btn.active,.btn:hover{opacity:1;color:#fff;border:1px solid rgba(255,255,255,.35);background:rgba(255,255,255,.1);transform:scale(1.08) translateY(-2px);box-shadow:0 12px 25px -10px rgba(0,0,0,.5)}

        @media (min-width:901px){.brand{gap:0}.tagline{margin-top:32px}.side-nav{gap:25px}.btn{width:62px;height:62px}.bottom-nav{gap:22px;margin-top:48px}}
        @media (max-width:900px){.side-nav,.bottom-nav{display:none!important}.mobile-nav{display:flex!important}}
        
        #container{position:fixed;inset:0;z-index:1000;background:transparent;display:none;opacity:0;transition:opacity .5s ease-in-out}
        #container.active{display:block;opacity:1}
        iframe{width:100%;height:100%;border:none;background:transparent}
    </style>
</head>
<body>
    <div id="loader"><div class="load-line"><div id="progress"></div></div></div>
    <div class="ambient-bg" id="bg"></div>
    <div class="overlay-dim"></div>
    <canvas id="webgl-canvas"></canvas>

    <div class="wrapper" id="ui">
        <div class="header">
            <div class="status-pill" id="status-pill">
                <span id="date">SYNCING</span>
                <span id="clock">00:00:00</span>
            </div>
        </div>

        <div class="side-nav nav-left" id="side-left">
            <div class="btn" onclick="setHash('settings')"><i data-lucide="settings"></i></div>
            <div class="btn" onclick="setHash('games')"><i data-lucide="gamepad-2"></i></div>
        </div>

        <div class="brand">
            <h1 class="logo" id="main-logo">HRN</h1>
            <p class="tagline" id="tagline"></p>

            <div class="mobile-nav" id="mobile-nav">
                <div class="btn" onclick="setHash('settings')"><i data-lucide="settings"></i></div>
                <div class="btn" onclick="setHash('games')"><i data-lucide="gamepad-2"></i></div>
                <div class="btn" onclick="setHash('info')"><i data-lucide="info"></i></div>
            </div>

            <div class="bottom-nav" id="bottom-nav">
                <div class="btn" onclick="setHash('settings')"><i data-lucide="settings"></i></div>
                <div class="btn" onclick="setHash('games')"><i data-lucide="gamepad-2"></i></div>
                <div class="btn" onclick="setHash('info')"><i data-lucide="info"></i></div>
                <div class="btn" onclick="setHash('add')"><i data-lucide="plus"></i></div>
            </div>
        </div>

        <div class="side-nav nav-right" id="side-right">
            <div class="btn" onclick="setHash('info')"><i data-lucide="info"></i></div>
            <div class="btn" onclick="setHash('add')"><i data-lucide="plus"></i></div>
        </div>
    </div>

    <div id="container"><iframe id="frame"></iframe></div>

    <script id="vs" type="x-shader/x-vertex">
        attribute vec2 a_pos;attribute float a_size;attribute float a_op;uniform vec2 u_res;uniform float u_time;varying float v_op;
        void main(){vec2 zeroToOne=a_pos/u_res;vec2 clipSpace=(zeroToOne*2.0)-1.0;gl_Position=vec4(clipSpace*vec2(1.0,-1.0),0.0,1.0);float pulse=0.85+(sin(u_time*1.5+a_op*10.0)*0.15);gl_PointSize=a_size*1.5*pulse;v_op=a_op;}
    </script>
    <script id="fs" type="x-shader/x-fragment">
        precision mediump float;uniform vec3 u_color;varying float v_op;
        void main(){float dist=distance(gl_PointCoord,vec2(0.5));if(dist>0.5)discard;gl_FragColor=vec4(u_color,(v_op*1.3)*(1.0-dist*2.0));}
    </script>

    <script id="worker-script" type="application/javascript">
        let particles = [];
        self.onmessage = function(e) {
            const { cmd, pAmount, w, h, opacity } = e.data;
            if (cmd === 'init') {
                particles = Array.from({length: pAmount}, () => ({
                    x: Math.random() * w, y: Math.random() * h,
                    s: Math.random() * 4 + 2.5,
                    vx: (Math.random() - 0.5) * 0.4, vy: (Math.random() - 0.5) * 0.4,
                    o: opacity * (Math.random() * 0.5 + 0.5)
                }));
            }
            if (cmd === 'update') {
                const posData = new Float32Array(particles.length * 2);
                const sizeData = new Float32Array(particles.length);
                const opData = new Float32Array(particles.length);
                for (let i = 0; i < particles.length; i++) {
                    let p = particles[i];
                    p.x = (p.x + p.vx + w) % w; p.y = (p.y + p.vy + h) % h;
                    posData[i*2] = p.x; posData[i*2+1] = p.y;
                    sizeData[i] = p.s; opData[i] = p.o;
                }
                self.postMessage({posData, sizeData, opData}, [posData.buffer, sizeData.buffer, opData.buffer]);
            }
        };
    </script>

    <script>
        const $ = id => document.getElementById(id);
        const cacheVersion = Date.now();
        const defaultBg = "https://img.freepik.com/free-vector/black-background-with-wavy-lines_52683-76524.jpg";
        const taglines = ["YOU ARE THE AURA","LEGEND IN MAKING","POWER WITHIN YOU","OWN THE GAME","FEARLESS AND STRONG","RULE YOUR WORLD","MASTER OF ALL","RISE ABOVE ALL","UNSTOPPABLE FORCE","YOU DEFINE GREAT","BORN TO WIN","NEXT LEVEL: YOU","ALWAYS STAY SHARP","VICTORY IS YOURS","PURE SKILL ONLY","YOUR TIME: NOW","GAME CHANGER: HERE","UNLEASH YOUR POWER","NO LIMITS FOR YOU","DOMINATE THE FIELD","LEGENDS WALK HERE","ALL EYES ON YOU","YOUR SKILL, YOUR RULE"];
        
        let db, gl, program, cache = {}, worker;
        let pAmount = 0, pEnabled = true, currentBgUrl = null;
        let posAttr, sizeAttr, opAttr, resUni, colUni, timeUni, posBuffer, sizeBuffer, opBuffer;

        function initWorker() {
            const blob = new Blob([$('worker-script').textContent], {type: 'application/javascript'});
            worker = new Worker(URL.createObjectURL(blob));
            worker.onmessage = (e) => renderGL(e.data);
        }

        function initGL() {
            const canvas = $('webgl-canvas');
            gl = canvas.getContext('webgl', { antialias: false, alpha: true });
            if (!gl) return;
            const createS = (t, s) => { const sh = gl.createShader(t); gl.shaderSource(sh, s); gl.compileShader(sh); return sh; };
            program = gl.createProgram();
            gl.attachShader(program, createS(gl.VERTEX_SHADER, $('vs').textContent));
            gl.attachShader(program, createS(gl.FRAGMENT_SHADER, $('fs').textContent));
            gl.linkProgram(program); gl.useProgram(program);
            posAttr = gl.getAttribLocation(program, "a_pos");
            sizeAttr = gl.getAttribLocation(program, "a_size");
            opAttr = gl.getAttribLocation(program, "a_op");
            resUni = gl.getUniformLocation(program, "u_res");
            colUni = gl.getUniformLocation(program, "u_color");
            timeUni = gl.getUniformLocation(program, "u_time");
            posBuffer = gl.createBuffer(); sizeBuffer = gl.createBuffer(); opBuffer = gl.createBuffer();
            gl.enable(gl.BLEND); gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
        }

        function renderGL(data) {
            if (!gl || !pEnabled) return;
            const { posData, sizeData, opData } = data;
            gl.clear(gl.COLOR_BUFFER_BIT);
            gl.uniform2f(resUni, window.innerWidth, window.innerHeight);
            gl.uniform1f(timeUni, (Date.now() - performance.now()) / 1000);
            const bind = (buf, attr, d, s) => {
                gl.bindBuffer(gl.ARRAY_BUFFER, buf);
                gl.bufferData(gl.ARRAY_BUFFER, d, gl.STREAM_DRAW);
                gl.enableVertexAttribArray(attr);
                gl.vertexAttribPointer(attr, s, gl.FLOAT, false, 0, 0);
            };
            bind(posBuffer, posAttr, posData, 2);
            bind(sizeBuffer, sizeAttr, sizeData, 1);
            bind(opBuffer, opAttr, opData, 1);
            gl.drawArrays(gl.POINTS, 0, pAmount);
            requestAnimationFrame(() => worker.postMessage({cmd: 'update', w: window.innerWidth, h: window.innerHeight}));
        }

        async function syncSettings() {
            const color = localStorage.getItem('hrn_clr') || "#89b4fa";
            const opacity = parseFloat(localStorage.getItem('hrn_op')) || 0.8;
            const density = parseFloat(localStorage.getItem('hrn_int')) || 1.1;
            pEnabled = localStorage.getItem('hrn_part') !== 'false';
            document.documentElement.style.setProperty('--accent', color);
            const r = parseInt(color.slice(1,3),16), g = parseInt(color.slice(3,5),16), b = parseInt(color.slice(5,7),16);
            if (gl) gl.uniform3f(colUni, r/255, g/255, b/255);
            const targetAmount = Math.floor(((window.innerWidth * window.innerHeight) / 10000) * density);
            if (pAmount !== targetAmount) {
                pAmount = targetAmount;
                worker.postMessage({cmd: 'init', pAmount, w: window.innerWidth, h: window.innerHeight, opacity});
                worker.postMessage({cmd: 'update', w: window.innerWidth, h: window.innerHeight});
            }

            // Background Loading with Reveal
            if(!db) await new Promise(res => { const req = indexedDB.open("hrn_db", 1); req.onsuccess = e => { db = e.target.result; res(); }; });
            const tx = db.transaction('background', 'readonly');
            const req = tx.objectStore('background').get('current_bg');
            req.onsuccess = () => {
                const val = req.result ? req.result.value : defaultBg;
                if (currentBgUrl && currentBgUrl.startsWith('blob:')) URL.revokeObjectURL(currentBgUrl);
                currentBgUrl = (val instanceof Blob) ? URL.createObjectURL(val) : (val || defaultBg);
                const bgEl = $('bg');
                bgEl.style.backgroundImage = `url('${currentBgUrl}')`;
                // De klasse triggeren na een kleine delay voor de CSS transitie
                setTimeout(() => bgEl.classList.add('loaded'), 100);
            };
            const isWide = window.innerWidth >= 901;
            const useSide = ((localStorage.getItem('hrn_nav_mode') || 'side') === 'side' && isWide);
            $('side-left').style.display = $('side-right').style.display = useSide ? 'flex' : 'none';
            $('bottom-nav').classList.toggle('show', !useSide && isWide);
        }

        function setHash(n) { window.location.hash = n; }
        function checkHash() {
            const h = window.location.hash.slice(1);
            const cont = $('container'), frame = $('frame');
            if (h && cache[h]) {
                frame.srcdoc = cache[h];
                cont.style.display = 'block';
                setTimeout(() => cont.classList.add('active'), 10);
            } else {
                cont.classList.remove('active');
                setTimeout(() => { if(!window.location.hash) { cont.style.display='none'; frame.srcdoc=''; } }, 500);
            }
        }

        window.onload = async () => {
            $('webgl-canvas').width = window.innerWidth; $('webgl-canvas').height = window.innerHeight;
            lucide.createIcons();
            $('tagline').textContent = taglines[Math.floor(Math.random() * taglines.length)];
            initWorker(); initGL(); await syncSettings();
            const pages = ['settings', 'games', 'info', 'add'];
            let loaded = 0;
            await Promise.all(pages.map(async p => {
                try {
                    const r = await fetch(`./pages/${p}?v=${cacheVersion}`);
                    cache[p] = r.ok ? await r.text() : `<h1>Error</h1>`;
                } catch(e) { cache[p] = '<h1>Offline</h1>'; }
                loaded++;
                $('progress').style.width = (10 + (loaded/pages.length * 90)) + '%';
            }));
            if(window.location.hash) checkHash();
            setTimeout(() => { $('loader').style.opacity = '0'; setTimeout(() => { $('loader').style.display = 'none'; $('ui').classList.add('active'); $('tagline').classList.add('show'); }, 800); }, 600);
        };

        window.addEventListener('resize', () => { if(gl){ $('webgl-canvas').width=window.innerWidth; $('webgl-canvas').height=window.innerHeight; gl.viewport(0,0,window.innerWidth,window.innerHeight); } syncSettings(); });
        window.addEventListener('hashchange', checkHash);
        window.addEventListener('message', e => { if(e.data==='sync') syncSettings(); if(e.data==='close') window.location.hash=''; });
        setInterval(() => { const n = new Date(); $('clock').textContent = n.toTimeString().split(' ')[0]; $('date').textContent = n.toLocaleDateString('en-US', {weekday:'short', day:'numeric'}).toUpperCase(); }, 1000);
    </script>
</body>
</html>
