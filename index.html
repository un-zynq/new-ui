<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="dynamic-title">HRN | Gaming Hub</title>
    <link rel="icon" id="dynamic-favicon" href="favicon.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #05070a;
            --accent: #89b4fa; /* Standaard blauw */
            --accent-glow: rgba(137, 180, 250, 0.18);
            --text-main: #f0f4ff;
            --text-dim: rgba(255, 255, 255, 0.58);
            --glass: rgba(255, 255, 255, 0.035);
            --glass-border: rgba(255, 255, 255, 0.09);
            --transition: all .35s cubic-bezier(.23, 1, .32, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; scrollbar-width: none; }
        *::-webkit-scrollbar { display: none; }
        html, body { height: 100dvh; width: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-main); overflow: hidden; user-select: none; }
        
        .ambient-bg { position: fixed; inset: 0; z-index: 1; background-size: cover; background-position: center; transition: opacity .6s ease; }
        #particles { position: fixed; inset: 0; z-index: 3; pointer-events: none; }
        .glow { position: fixed; width: 460px; height: 460px; background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%); border-radius: 50%; pointer-events: none; z-index: 2; opacity: .38; filter: blur(55px); mix-blend-mode: screen; display: none; }
        @media(hover: hover) { .glow { display: block; } }

        .wrapper { display: flex; flex-direction: column; height: 100dvh; padding: 28px 36px; max-width: 1680px; margin: 0 auto; position: relative; z-index: 10; }
        .header { display: flex; justify-content: center; z-index: 50; opacity: 0; transition: opacity .6s ease; }
        .header.show { opacity: 1; }
        #status-pill { display: flex; align-items: center; gap: 14px; background: var(--glass); padding: 9px 24px; border-radius: 9999px; border: 1px solid var(--glass-border); backdrop-filter: blur(20px); font-size: .75rem; font-weight: 500; color: var(--text-dim); text-transform: uppercase; }
        
        .main { display: flex; justify-content: space-between; align-items: center; flex-grow: 1; position: relative; z-index: 20; }
        .side-link { width: 62px; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; color: var(--text-main); background: var(--glass); border: 1px solid var(--glass-border); border-radius: 15px; transition: var(--transition); text-decoration: none; }
        .side-link:hover, .side-link.active { background: var(--accent-glow); border-color: var(--accent); color: var(--accent); transform: translateY(-4px); box-shadow: 0 0 20px var(--accent-glow); }
        
        .logo { font-size: clamp(4.2rem, 14vw, 10.5rem); font-weight: 900; letter-spacing: -.07em; line-height: .82; background: linear-gradient(180deg, #fff 20%, var(--accent) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 20px 45px var(--accent-glow)); opacity: .6; }
        
        #iframe-container { position: fixed; inset: 0; z-index: 100; background: var(--bg); opacity: 0; visibility: hidden; transition: opacity .4s ease; pointer-events: none; }
        #iframe-container.active { opacity: 1; visibility: visible; pointer-events: auto; }
        #content-iframe { width: 100%; height: 100%; border: none; }
        
        .spinner { width: 42px; height: 42px; border: 3px solid var(--glass-border); border-top-color: var(--accent); border-radius: 50%; animation: spin .9s linear infinite; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="ambient-bg" id="ambient-bg"></div>
    <div class="glow" id="mouse-glow"></div>
    <canvas id="particles"></canvas>

    <div class="wrapper">
        <header class="header" id="header">
            <div id="status-pill"><span id="date"></span><div style="width:1px;height:12px;background:var(--glass-border)"></div><span id="clock"></span></div>
        </header>
        <main class="main">
            <nav class="side-nav desktop-only" style="display:flex; flex-direction:column; gap:16px;">
                <a href="#" class="side-link" data-page="settings"><i data-lucide="settings"></i></a>
                <a href="#" class="side-link" data-page="games"><i data-lucide="gamepad-2"></i></a>
                <a href="#" class="side-link" data-page="bookmarklets"><i data-lucide="bookmark"></i></a>
            </nav>
            <div class="center-brand"><h1 class="logo">HRN</h1></div>
            <nav class="side-nav desktop-only" style="display:flex; flex-direction:column; gap:16px;">
                <a href="#" class="side-link" data-page="about"><i data-lucide="info"></i></a>
                <a href="#" class="side-link" data-page="add"><i data-lucide="plus"></i></a>
            </nav>
        </main>
    </div>

    <div id="iframe-container">
        <div id="iframe-loading"><div class="spinner"></div></div>
        <iframe id="content-iframe" src=""></iframe>
    </div>

    <script>
        lucide.createIcons();
        let particlesArray = [], w, h;
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');

        function hexToRgba(hex, alpha) {
            const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        function syncSettings() {
            const bgUrl = localStorage.getItem('hrn_bg_url');
            const tabTitle = localStorage.getItem('hrn_tab_title') || "HRN | Gaming Hub";
            const favicon = localStorage.getItem('hrn_favicon_url');
            const themeColor = localStorage.getItem('hrn_theme_color') || "#89b4fa";
            const particleMode = localStorage.getItem('hrn_particle_amount') || "mid";

            // Update CSS Variabelen
            document.documentElement.style.setProperty('--accent', themeColor);
            document.documentElement.style.setProperty('--accent-glow', hexToRgba(themeColor, 0.18));

            // Browser info
            document.getElementById('dynamic-title').textContent = tabTitle;
            if(favicon) document.querySelector("link[rel*='icon']").href = favicon;
            
            // Background
            const ambient = document.getElementById('ambient-bg');
            ambient.style.backgroundImage = bgUrl ? `url('${bgUrl}')` : '';
            ambient.style.opacity = bgUrl ? '0.3' : '1';

            // Particles herstarten als amount is veranderd
            initParticles(particleMode);
        }

        // Particle System
        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * w; this.y = Math.random() * h;
                this.size = Math.random() * 1.5 + 0.5;
                this.speedX = Math.random() * 0.2 - 0.1; this.speedY = Math.random() * 0.2 - 0.1;
                this.opacity = Math.random() * 0.5 + 0.1;
            }
            update() {
                this.x += this.speedX; this.y += this.speedY;
                if (this.x < 0 || this.x > w || this.y < 0 || this.y > h) this.reset();
            }
            draw() {
                ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--accent');
                ctx.globalAlpha = this.opacity;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }

        function initParticles(mode) {
            if (mode === "off") { particlesArray = []; return; }
            const counts = { low: 40, mid: 100, high: 250 };
            const targetCount = counts[mode] || 100;
            if (particlesArray.length === targetCount) return;
            particlesArray = [];
            for (let i = 0; i < targetCount; i++) particlesArray.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, w, h);
            particlesArray.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        // Iframe Logic
        const container = document.getElementById('iframe-container');
        const iframe = document.getElementById('content-iframe');
        let currentPage = null;

        function openPage(page) {
            if (currentPage === page) { container.classList.remove('active'); currentPage = null; return; }
            currentPage = page;
            container.classList.add('active');
            iframe.src = page + '.html';
        }

        window.addEventListener('message', e => {
            if (e.data.type === 'updateSettings') syncSettings();
            if (e.data.type === 'closeIframe') { container.classList.remove('active'); currentPage = null; }
        });

        document.querySelectorAll('.side-link').forEach(l => l.addEventListener('click', e => { e.preventDefault(); openPage(l.dataset.page); }));
        
        window.addEventListener('resize', () => { w = window.innerWidth; h = window.innerHeight; canvas.width = w; canvas.height = h; });
        window.addEventListener('load', () => { 
            w = window.innerWidth; h = window.innerHeight; canvas.width = w; canvas.height = h;
            syncSettings(); animate(); 
            document.getElementById('header').classList.add('show');
            setInterval(() => {
                const now = new Date();
                document.getElementById('clock').textContent = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                document.getElementById('date').textContent = now.toLocaleDateString([], {weekday:'short', day:'numeric', month:'short'});
            }, 1000);
        });
    </script>
</body>
</html>
