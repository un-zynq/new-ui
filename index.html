<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HRN | Gaming Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Vanta.js NET -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>

    <style>
        :root {
            --bg: #05070a;
            --accent: #89b4fa;
            --text-main: #f0f4ff;
            --text-dim: rgba(255, 255, 255, 0.65);
            --glass: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100dvh;
            width: 100%;
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text-main);
            overflow: hidden;
            user-select: none;
            touch-action: manipulation;
        }

        /* Vanta Background */
        #vanta-bg {
            position: fixed;
            inset: 0;
            z-index: 1;
        }

        .ambient-overlay {
            position: fixed;
            inset: 0;
            z-index: 2;
            background: radial-gradient(circle at 50% 30%, rgba(137, 180, 250, 0.035) 0%, transparent 60%);
            pointer-events: none;
        }

        /* Content Container */
        .wrapper {
            position: relative;
            z-index: 10;
            height: 100dvh;
            width: 100%;
            max-width: 1680px;
            margin: 0 auto;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Header */
        .header {
            text-align: center;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        .header.show { opacity: 1; }

        #status-pill {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: var(--glass);
            padding: 8px 20px;
            border-radius: 9999px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            font-size: 0.78rem;
            font-weight: 500;
            letter-spacing: 0.08em;
            color: var(--text-dim);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 20px;
        }

        .logo {
            font-size: clamp(3.8rem, 15vw, 9.5rem);
            font-weight: 900;
            letter-spacing: -0.06em;
            line-height: 0.85;
            background: linear-gradient(180deg, #f0f4ff 25%, #a8c4ff 75%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 15px 40px rgba(137, 180, 250, 0.4));
        }

        .tagline {
            font-size: 1.05rem;
            font-weight: 400;
            letter-spacing: 0.18em;
            color: var(--text-dim);
            margin-top: -8px;
        }

        /* Info Pills */
        .info-pills {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 10px;
        }

        .info-pill {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 9999px;
            padding: 9px 18px;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(16px);
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .info-pill:hover {
            border-color: var(--accent);
            color: var(--text-main);
            transform: translateY(-2px);
        }

        /* Discord Button */
        .discord-pill {
            margin-top: 12px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 14px 32px;
            border-radius: 9999px;
            border: 1px solid rgba(255,255,255,0.15);
            background: var(--glass);
            backdrop-filter: blur(18px);
            font-weight: 600;
            letter-spacing: 0.06em;
            color: white;
            text-decoration: none;
            transition: all 0.35s ease;
        }

        .discord-pill:hover {
            background: rgba(137, 180, 250, 0.15);
            border-color: var(--accent);
        }

        .discord-pill svg {
            width: 24px;
            height: 24px;
        }

        /* Navigation */
        .nav-container {
            display: flex;
            justify-content: center;
            z-index: 20;
        }

        .side-nav {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 420px;
        }

        .side-link {
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            color: var(--text-main);
            transition: all 0.35s cubic-bezier(0.23, 1, 0.32, 1);
            text-decoration: none;
        }

        .side-link:hover {
            background: rgba(137, 180, 250, 0.12);
            border-color: var(--accent);
            transform: translateY(-4px) scale(1.06);
            color: var(--accent);
        }

        .side-link svg {
            width: 24px;
            height: 24px;
            stroke-width: 2.2px;
        }

        /* Mouse Glow */
        .glow {
            position: fixed;
            width: 420px;
            height: 420px;
            background: radial-gradient(circle, rgba(137, 180, 250, 0.12) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 3;
            opacity: 0.25;
            filter: blur(70px);
            mix-blend-mode: screen;
            display: none;
        }

        @media (hover: hover) {
            .glow { display: block; }
        }

        /* Mobile Optimizations */
        @media (max-width: 640px) {
            .wrapper {
                padding: 18px 16px;
            }
            .logo {
                font-size: clamp(3.4rem, 18vw, 7.8rem);
            }
            .side-nav {
                grid-template-columns: repeat(3, 1fr);
                max-width: 320px;
                gap: 9px;
            }
            .discord-pill {
                padding: 13px 24px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <!-- Vanta Net Background -->
    <div id="vanta-bg"></div>
    <div class="ambient-overlay"></div>
    <div class="glow" id="mouse-glow"></div>

    <div class="wrapper">
        <!-- Header -->
        <header class="header" id="header">
            <div id="status-pill">
                <span id="date"></span>
                <span style="opacity:0.4">•</span>
                <span id="clock"></span>
            </div>
        </header>

        <!-- Center Content -->
        <div class="main-content">
            <h1 class="logo">HRN</h1>
            <p class="tagline">ELITE GAMING COMMUNITY</p>

            <div class="info-pills" id="info-pills"></div>

            <a href="https://discord.gg/JAmeRKQzX" target="_blank" rel="noopener noreferrer" class="discord-pill">
                <svg viewBox="0 0 127.14 96.36" aria-hidden="true">
                    <path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.71,32.65-1.82,56.6.48,80.21h0A105.73,105.73,0,0,0,32.47,96.36,77.7,77.7,0,0,0,39.2,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.73,11.1,105.32,105.32,0,0,0,32.05-16.15h0C129.58,52.84,121,29.22,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5.07-12.73,11.41-12.73S54,46,53.86,53,48.74,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5.07-12.73,11.44-12.73S96.23,46,96.11,53,91,65.69,84.69,65.69Z"/>
                </svg>
                <span>JOIN DISCORD</span>
            </a>
        </div>

        <!-- Navigation -->
        <div class="nav-container">
            <nav class="side-nav" aria-label="Main navigation">
                <a href="#" class="side-link" aria-label="Play"><i data-lucide="play"></i></a>
                <a href="#" class="side-link" aria-label="Community"><i data-lucide="users"></i></a>
                <a href="#" class="side-link" aria-label="Tournaments"><i data-lucide="trophy"></i></a>
                <a href="#" class="side-link" aria-label="Shop"><i data-lucide="shopping-cart"></i></a>
                <a href="#" class="side-link" aria-label="Settings" onclick="toggleBG()"><i data-lucide="settings"></i></a>
                <a href="#" class="side-link" aria-label="Profile"><i data-lucide="user"></i></a>
            </nav>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // Vanta NET
        let vantaEffect;
        function initVanta() {
            vantaEffect = VANTA.NET({
                el: "#vanta-bg",
                mouseControls: true,
                touchControls: true,
                gyroControls: false,
                minHeight: 200,
                minWidth: 200,
                scale: 1.0,
                scaleMobile: 1.0,
                color: 0x89b4fa,
                backgroundColor: 0x05070a,
                points: 10,
                maxDistance: 20,
                spacing: 15,
                showDots: true
            });
        }

        function toggleBG() {
            document.body.classList.toggle('show-bg');
            localStorage.setItem('bg-visible', document.body.classList.contains('show-bg'));
        }

        function updateDateTime() {
            const now = new Date();
            const hours = now.getHours() % 12 || 12;
            const min = now.getMinutes().toString().padStart(2, '0');
            const ampm = now.getHours() >= 12 ? 'PM' : 'AM';
            const dateStr = now.toLocaleDateString('nl-NL', { weekday: 'short', month: 'short', day: 'numeric' }).toUpperCase();
            
            document.getElementById('clock').textContent = `${hours}:${min} ${ampm}`;
            document.getElementById('date').textContent = dateStr;
        }

        // Mouse glow
        const glow = document.getElementById('mouse-glow');
        let targetX = 0, targetY = 0, currentX = 0, currentY = 0;

        document.addEventListener('mousemove', (e) => {
            targetX = e.clientX;
            targetY = e.clientY;
        }, { passive: true });

        function animateGlow() {
            currentX += (targetX - currentX) * 0.085;
            currentY += (targetY - currentY) * 0.085;
            glow.style.transform = `translate3d(${currentX}px, ${currentY}px, 0) translate(-50%, -50%)`;
            requestAnimationFrame(animateGlow);
        }

        function checkHeaderVisibility() {
            const header = document.getElementById('header');
            header.classList.toggle('show', window.innerHeight > 580);
        }

        async function loadRandomGames() {
            const container = document.getElementById('info-pills');
            if (!container) return;

            try {
                const res = await fetch('https://un-zynq.github.io/games.json');
                const data = await res.json();
                let all = [];
                Object.values(data).forEach(arr => { if (Array.isArray(arr)) all = all.concat(arr); });
                const shuffled = all.sort(() => 0.5 - Math.random()).slice(0, 2);

                container.innerHTML = `
                    <a href="/game/${shuffled[0]}" class="info-pill">
                        <i data-lucide="play-circle"></i>
                        <span>${shuffled[0].replace(/-/g, ' ')}</span>
                    </a>
                    <a href="/unblocked/" class="info-pill">
                        <i data-lucide="globe"></i>
                        <span>Backup Sites</span>
                    </a>
                `;
                lucide.createIcons();
            } catch (e) {
                container.innerHTML = `
                    <a href="/game/2048" class="info-pill"><i data-lucide="play-circle"></i><span>2048</span></a>
                    <a href="/unblocked/" class="info-pill"><i data-lucide="globe"></i><span>Backup Sites</span></a>
                `;
                lucide.createIcons();
            }
        }

        // Initialize everything
        window.addEventListener('load', () => {
            initVanta();
            updateDateTime();
            setInterval(updateDateTime, 1000);
            checkHeaderVisibility();
            loadRandomGames();
            animateGlow();
        });

        window.addEventListener('resize', checkHeaderVisibility);

        // Cleanup
        window.addEventListener('beforeunload', () => {
            if (vantaEffect) vantaEffect.destroy();
        });
    </script>
</body>
</html>
