<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="dynamic-title">HRN</title>
    <link id="app-favicon" rel="icon" type="image/png" href="/logo.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root{--bg:#030508;--accent:#89b4fa;--ui-silver:rgba(235,240,255,0.85);--ui-border:rgba(255,255,255,0.1)}
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        body,html{height:100%;width:100%;background:var(--bg);color:var(--ui-silver);font-family:Inter,sans-serif;overflow:hidden;text-transform:uppercase}
        #webgl-canvas{position:fixed;inset:0;z-index:2;pointer-events:none}
        .ambient-bg{position:fixed;inset:0;z-index:1;background-size:cover;background-position:center;opacity:0;filter:brightness(0.6);transition:2s ease-in-out}
        .ambient-bg.loaded{opacity:1}
        .overlay-dim{position:fixed;inset:0;z-index:3;background:radial-gradient(circle at center, transparent, rgba(0,0,0,0.4));pointer-events:none}
        #loader{position:fixed;inset:0;z-index:10000;background:var(--bg);display:flex;align-items:center;justify-content:center;transition:opacity .8s ease}
        .load-line{width:200px;height:2px;background:rgba(255,255,255,.05);position:relative;overflow:hidden}
        #progress{position:absolute;height:100%;width:0%;background:var(--accent);transition:width 0.4s ease;box-shadow:0 0 15px var(--accent)}
        .wrapper{position:relative;display:flex;flex-direction:column;height:100dvh;width:100%;z-index:10;opacity:0;transition:1.5s ease}
        .wrapper.active{opacity:1}
        .header{position:absolute;top:30px;width:100%;display:flex;justify-content:center;z-index:100}
        .status-pill{background:rgba(0,0,0,0.5);border:1px solid var(--ui-border);padding:10px 25px;border-radius:100px;backdrop-filter:blur(10px);font-size:9px;font-weight:900;letter-spacing:2px;display:flex;gap:20px}
        .brand{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;width:100%}
        .logo{font-size:clamp(5rem, 20vw, 10rem);font-weight:900;letter-spacing:-.05em;background:linear-gradient(180deg,#fff, var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;opacity:0.8}
        .tagline{font-size:10px;font-weight:600;letter-spacing:8px;color:#fff;margin-top:20px;opacity:0;transform:translateY(10px);transition:1s ease 0.5s}
        .tagline.show{opacity:0.7;transform:translateY(0)}
        .side-nav{position:absolute;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:20px;padding:0 40px;z-index:20}
        .nav-left{left:0}.nav-right{right:0}
        .btn{width:60px;height:60px;border-radius:20px;background:rgba(0,0,0,0.4);border:1px solid var(--ui-border);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:0.3s;backdrop-filter:blur(10px)}
        .btn:hover{transform:scale(1.1);border-color:var(--accent);background:rgba(255,255,255,0.05)}
        #container{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.5);display:none;opacity:0;transition:0.4s ease}
        #container.active{display:block;opacity:1}
        iframe{width:100%;height:100%;border:none}
        @media (max-width:900px){ .side-nav{display:none} }
    </style>
</head>
<body>
    <div id="loader"><div class="load-line"><div id="progress"></div></div></div>
    <div class="ambient-bg" id="bg"></div>
    <div class="overlay-dim"></div>
    <canvas id="webgl-canvas"></canvas>
    
    <div class="wrapper" id="ui">
        <div class="header">
            <div class="status-pill">
                <span id="date">SYNCING</span>
                <span id="clock">00:00:00</span>
            </div>
        </div>
        <div class="side-nav nav-left">
            <div class="btn" onclick="setHash('settings')"><i data-lucide="settings"></i></div>
            <div class="btn" onclick="setHash('games')"><i data-lucide="gamepad-2"></i></div>
        </div>
        <div class="brand">
            <h1 class="logo">HRN</h1>
            <p class="tagline" id="tagline"></p>
        </div>
        <div class="side-nav nav-right">
            <div class="btn" onclick="setHash('about')"><i data-lucide="info"></i></div>
            <div class="btn" onclick="setHash('add')"><i data-lucide="plus"></i></div>
        </div>
    </div>

    <div id="container"><iframe id="frame"></iframe></div>

    <script id="vs" type="x-shader/x-vertex">
        attribute vec2 a_pos;
        attribute float a_size;
        attribute float a_op;
        uniform vec2 u_res;
        uniform float u_time;
        varying float v_op;
        void main() {
            vec2 clipSpace = (a_pos / u_res * 2.0) - 1.0;
            gl_Position = vec4(clipSpace * vec2(1, -1), 0, 1);
            gl_PointSize = a_size * (0.8 + sin(u_time + a_op) * 0.2);
            v_op = a_op;
        }
    </script>

    <script id="fs" type="x-shader/x-fragment">
        precision mediump float;
        uniform vec3 u_color;
        varying float v_op;
        void main() {
            float d = distance(gl_PointCoord, vec2(0.5));
            if (d > 0.5) discard;
            gl_FragColor = vec4(u_color, v_op * (1.0 - d * 2.0));
        }
    </script>

    <script>
        lucide.createIcons();
        const $ = id => document.getElementById(id);
        const canvas = $('webgl-canvas');
        const gl = canvas.getContext('webgl');
        let particles = [], pAmount = 0, pEnabled = true, program;
        let posBuffer, sizeBuffer, opBuffer, posAttr, sizeAttr, opAttr, resUni, colUni, timeUni;
        const defaultImg = "https://img.freepik.com/free-vector/black-background-with-wavy-lines_52683-76524.jpg";

        const taglines = ["YOU ARE THE AURA", "LEGEND IN MAKING", "POWER WITHIN YOU", "OWN THE GAME", "RISE ABOVE ALL"];

        function initGL() {
            const createS = (t, s) => {
                const sh = gl.createShader(t);
                gl.shaderSource(sh, s);
                gl.compileShader(sh);
                return sh;
            };
            const v = createS(gl.VERTEX_SHADER, $('vs').text);
            const f = createS(gl.FRAGMENT_SHADER, $('fs').text);
            program = gl.createProgram();
            gl.attachShader(program, v); gl.attachShader(program, f);
            gl.linkProgram(program); gl.useProgram(program);

            posAttr = gl.getAttribLocation(program, "a_pos");
            sizeAttr = gl.getAttribLocation(program, "a_size");
            opAttr = gl.getAttribLocation(program, "a_op");
            resUni = gl.getUniformLocation(program, "u_res");
            colUni = gl.getUniformLocation(program, "u_color");
            timeUni = gl.getUniformLocation(program, "u_time");

            posBuffer = gl.createBuffer();
            sizeBuffer = gl.createBuffer();
            opBuffer = gl.createBuffer();

            gl.enable(gl.BLEND);
            gl.blendFunc(gl.SRC_ALPHA, gl.ONE);
        }

        function sync() {
            const clr = localStorage.getItem('hrn_clr') || "#89b4fa";
            const dens = parseFloat(localStorage.getItem('hrn_int')) || 1.1;
            const op = parseFloat(localStorage.getItem('hrn_op')) || 0.8;
            pEnabled = localStorage.getItem('hrn_part') !== 'false';
            
            document.documentElement.style.setProperty('--accent', clr);
            $('dynamic-title').textContent = localStorage.getItem('hrn_title') || "HRN | CORE";
            
            const bgUrl = localStorage.getItem('hrn_bg') || defaultImg;
            $('bg').style.backgroundImage = `url(${bgUrl})`;
            $('bg').classList.add('loaded');

            if (pEnabled) {
                pAmount = Math.floor(((window.innerWidth * window.innerHeight) / 10000) * dens);
                particles = [];
                for(let i=0; i<pAmount; i++) {
                    particles.push({
                        x: Math.random() * window.innerWidth,
                        y: Math.random() * window.innerHeight,
                        s: Math.random() * 3 + 2,
                        vx: (Math.random()-0.5)*0.5,
                        vy: (Math.random()-0.5)*0.5,
                        o: Math.random() * op
                    });
                }
            }

            const r = parseInt(clr.slice(1,3), 16)/255, g = parseInt(clr.slice(3,5), 16)/255, b = parseInt(clr.slice(5,7), 16)/255;
            gl.uniform3f(colUni, r, g, b);
        }

        function render(t) {
            gl.clear(gl.COLOR_BUFFER_BIT);
            if (!pEnabled) { requestAnimationFrame(render); return; }

            const posData = new Float32Array(pAmount * 2);
            const sizeData = new Float32Array(pAmount);
            const opData = new Float32Array(pAmount);

            for(let i=0; i<pAmount; i++) {
                let p = particles[i];
                p.x = (p.x + p.vx + window.innerWidth) % window.innerWidth;
                p.y = (p.y + p.vy + window.innerHeight) % window.innerHeight;
                posData[i*2] = p.x; posData[i*2+1] = p.y;
                sizeData[i] = p.s; opData[i] = p.o;
            }

            gl.uniform2f(resUni, canvas.width, canvas.height);
            gl.uniform1f(timeUni, t/1000);

            gl.bindBuffer(gl.ARRAY_BUFFER, posBuffer);
            gl.bufferData(gl.ARRAY_BUFFER, posData, gl.DYNAMIC_DRAW);
            gl.vertexAttribPointer(posAttr, 2, gl.FLOAT, false, 0, 0);
            gl.enableVertexAttribArray(posAttr);

            gl.bindBuffer(gl.ARRAY_BUFFER, sizeBuffer);
            gl.bufferData(gl.ARRAY_BUFFER, sizeData, gl.DYNAMIC_DRAW);
            gl.vertexAttribPointer(sizeAttr, 1, gl.FLOAT, false, 0, 0);
            gl.enableVertexAttribArray(sizeAttr);

            gl.bindBuffer(gl.ARRAY_BUFFER, opBuffer);
            gl.bufferData(gl.ARRAY_BUFFER, opData, gl.DYNAMIC_DRAW);
            gl.vertexAttribPointer(opAttr, 1, gl.FLOAT, false, 0, 0);
            gl.enableVertexAttribArray(opAttr);

            gl.drawArrays(gl.POINTS, 0, pAmount);
            requestAnimationFrame(render);
        }

        window.setHash = n => window.location.hash = n;
        
        window.addEventListener('hashchange', () => {
            const h = window.location.hash.slice(1);
            if(h === 'settings') {
                $('frame').src = 'settings.html';
                $('container').classList.add('active');
            } else if (!h) {
                $('container').classList.remove('active');
            }
        });

        window.addEventListener('message', e => {
            if(e.data === 'sync') sync();
            if(e.data === 'close') setHash('');
        });

        window.onload = () => {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            $('tagline').textContent = taglines[Math.floor(Math.random()*taglines.length)];
            initGL(); sync(); render(0);
            setTimeout(() => {
                $('loader').style.opacity = 0;
                $('ui').classList.add('active');
                $('tagline').classList.add('show');
                setTimeout(() => $('loader').style.display='none', 800);
            }, 1000);
        };

        setInterval(() => {
            const n = new Date();
            $('clock').textContent = n.toTimeString().split(' ')[0];
            $('date').textContent = n.toLocaleDateString('en-US', {weekday:'short', day:'numeric'}).toUpperCase();
        }, 1000);
    </script>
</body>
</html>
