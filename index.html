<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="dynamic-title">HRN</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #030508;
            --accent: #89b4fa;
            --text: #f0f4ff;
            --dim: rgba(255, 255, 255, 0.4);
            --border: rgba(255, 255, 255, 0.1);
            --logo-opacity: 0.5;
        }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; width: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; }

        /* Minimal Loader */
        #loader {
            position: fixed; inset: 0; z-index: 9999; background: var(--bg);
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.5s ease;
        }
        .load-line { width: 150px; height: 1px; background: rgba(255,255,255,0.1); position: relative; }
        #progress { position: absolute; height: 100%; width: 0%; background: var(--accent); transition: width 0.3s; }

        /* UI */
        .wrapper { 
            position: relative; display: flex; flex-direction: column; height: 100dvh; padding: 30px; 
            z-index: 10; opacity: 0; transition: opacity 0.5s ease;
        }
        .wrapper.active { opacity: 1; }

        .ambient-bg { position: fixed; inset: 0; z-index: 1; pointer-events: none; background: center/cover no-repeat; opacity: 0; filter: brightness(0.4); transition: opacity 1s; }
        canvas { position: fixed; inset: 0; z-index: 2; pointer-events: none; }
        
        .header { display: flex; justify-content: center; margin-bottom: auto; }
        .pill { background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 8px 20px; border-radius: 100px; backdrop-filter: blur(10px); font-size: 11px; color: var(--dim); display: flex; gap: 15px; }

        .main { display: flex; align-items: center; justify-content: space-between; margin: auto 0; width: 100%; }
        .side-nav { display: flex; flex-direction: column; gap: 15px; }
        .btn { 
            width: 56px; height: 56px; border-radius: 18px; background: rgba(255,255,255,0.02); 
            border: 1px solid var(--border); color: var(--dim); display: flex; align-items: center; 
            justify-content: center; cursor: pointer; transition: 0.2s; pointer-events: all;
        }
        .btn:hover, .btn.active { color: var(--accent); border-color: var(--accent); background: rgba(255,255,255,0.05); }

        .brand { flex: 1; text-align: center; }
        .logo { 
            font-size: clamp(4rem, 15vw, 10rem); font-weight: 900; letter-spacing: -0.05em; line-height: 0.8;
            background: linear-gradient(180deg, #fff 40%, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            opacity: var(--logo-opacity); transition: 0.3s;
        }
        .tagline { font-size: 11px; letter-spacing: 6px; color: var(--dim); text-transform: uppercase; margin-top: 20px; }

        /* Iframe Logic */
        #container { position: fixed; inset: 0; z-index: 100; background: var(--bg); display: none; }
        #container.active { display: block; }
        iframe { width: 100%; height: 100%; border: none; }

        @media (max-width: 768px) { .main { flex-direction: column; gap: 40px; } .side-nav { flex-direction: row; } }
    </style>
</head>
<body>
    <div id="loader"><div class="load-line"><div id="progress"></div></div></div>
    <div class="ambient-bg" id="bg"></div>
    <canvas id="p"></canvas>

    <div class="wrapper" id="ui">
        <div class="header">
            <div class="pill"><span id="date">--</span><span id="clock">00:00</span></div>
        </div>
        <div class="main">
            <div class="side-nav">
                <div class="btn" onclick="openPage('settings')"><i data-lucide="settings"></i></div>
                <div class="btn" onclick="openPage('games')"><i data-lucide="gamepad-2"></i></div>
                <div class="btn" onclick="openPage('bookmarklets')"><i data-lucide="bookmark"></i></div>
            </div>
            <div class="brand">
                <h1 class="logo">HRN</h1>
                <p class="tagline">SYSTEM READY</p>
            </div>
            <div class="side-nav">
                <div class="btn" onclick="openPage('about')"><i data-lucide="info"></i></div>
                <div class="btn" onclick="openPage('add')"><i data-lucide="plus"></i></div>
            </div>
        </div>
        <div style="height: 50px;"></div>
    </div>

    <div id="container"><iframe id="frame"></iframe></div>

    <script>
        lucide.createIcons();
        const $ = id => document.getElementById(id);
        const cache = {};

        // Robust Page Loader
        async function loadPageData(name) {
            try {
                const res = await fetch(name + '.html');
                if (!res.ok) throw new Error();
                cache[name] = await res.text();
            } catch (e) {
                cache[name] = `<body style="background:#030508;color:#89b4fa;font-family:sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;margin:0;">
                    <h1 style="font-size:1.2rem;letter-spacing:2px;">PAGE NOT FOUND</h1>
                    <p style="color:rgba(255,255,255,0.3);font-size:0.8rem;margin-top:10px;">${name}.html is missing</p>
                    <button onclick="window.parent.postMessage('close','*')" style="margin-top:20px;background:none;border:1px solid #89b4fa;color:#89b4fa;padding:10px 20px;border-radius:5px;cursor:pointer;">Go Back</button>
                </body>`;
            }
        }

        async function init() {
            const pages = ['settings', 'games', 'about', 'add', 'bookmarklets'];
            let done = 0;
            
            for (const p of pages) {
                await loadPageData(p);
                done++;
                $('progress').style.width = (done / pages.length * 100) + '%';
            }

            syncSettings();
            
            setTimeout(() => {
                $('loader').style.opacity = '0';
                setTimeout(() => $('loader').style.display = 'none', 500);
                $('ui').classList.add('active');
            }, 600);
        }

        function syncSettings() {
            const clr = localStorage.getItem('hrn_clr') || "#89b4fa";
            const op = localStorage.getItem('hrn_op') || "0.5";
            const bg = localStorage.getItem('hrn_bg');
            
            document.documentElement.style.setProperty('--accent', clr);
            document.documentElement.style.setProperty('--logo-opacity', op);
            if(bg) { $('bg').style.backgroundImage = `url(${bg})`; $('bg').style.opacity = 0.5; }
        }

        function openPage(name) {
            const f = $('frame');
            f.srcdoc = cache[name];
            $('container').style.display = 'block';
        }

        window.addEventListener('message', e => {
            if(e.data === 'close') $('container').style.display = 'none';
            if(e.data === 'sync') syncSettings();
        });

        // Clock logic
        setInterval(() => {
            const n = new Date();
            $('clock').textContent = n.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
            $('date').textContent = n.toLocaleDateString([], {weekday:'short',day:'numeric'});
        }, 1000);

        window.onload = init;
    </script>
</body>
</html>
