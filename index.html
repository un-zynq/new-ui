<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="dynamic-title">HRN</title>
    <link id="app-favicon" rel="icon" type="image/png" href="/logo.svg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root{--bg:#030508;--accent:#89b4fa;--ui-silver:rgba(235,240,255,0.85);--ui-border:rgba(255,255,255,0.1)}
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        body,html{height:100%;width:100%;background:var(--bg);color:var(--ui-silver);font-family:Inter,sans-serif;overflow:hidden;text-transform:uppercase}
        #webgl-canvas{position:fixed;inset:0;z-index:2;pointer-events:none}
        .ambient-bg{position:fixed;inset:0;z-index:1;background-size:cover;background-position:center;opacity:0;filter:brightness(0.6);transition:1.5s ease}
        .ambient-bg.loaded{opacity:1}
        .overlay-dim{position:fixed;inset:0;z-index:1;background:radial-gradient(circle, transparent 20%, rgba(0,0,0,0.4) 100%);pointer-events:none}
        #loader { position:fixed; inset:0; z-index:10000; background:var(--bg); display:flex; align-items:center; justify-content:center; transition:0.5s; }
        .load-line { width:200px; height:2px; background:rgba(255,255,255,0.05); position:relative; overflow:hidden; }
        #progress { position:absolute; height:100%; width:0%; background:var(--accent); transition:0.3s; box-shadow:0 0 15px var(--accent); }
        .wrapper{position:relative;display:flex;flex-direction:column;height:100dvh;width:100%;z-index:10;opacity:0;transition:1s ease}
        .wrapper.active{opacity:1}
        .header{position:absolute;top:30px;width:100%;display:flex;justify-content:center;z-index:100}
        .status-pill{background:rgba(0,0,0,0.5);border:1px solid var(--ui-border);padding:10px 25px;border-radius:100px;backdrop-filter:blur(10px);font-size:10px;font-weight:900;letter-spacing:2px;display:flex;gap:20px}
        .brand{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);text-align:center;width:100%;pointer-events:none}
        .logo{font-size:clamp(4rem, 15vw, 10rem);font-weight:900;letter-spacing:-0.05em;background:linear-gradient(180deg,#fff, var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;opacity:0.8}
        .side-nav{position:absolute;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:20px;padding:0 40px;z-index:20}
        .nav-left{left:0}.nav-right{right:0}
        .btn{width:60px;height:60px;border-radius:15px;background:rgba(0,0,0,0.5);border:1px solid var(--ui-border);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:0.3s;backdrop-filter:blur(10px)}
        .btn:hover{transform:scale(1.1);border-color:var(--accent);box-shadow:0 0 20px rgba(var(--accent-rgb), 0.2)}
        #container{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.3);display:none;opacity:0;transition:0.4s;backdrop-filter:blur(5px)}
        #container.active{display:block;opacity:1}
        iframe{width:100%;height:100%;border:none}
    </style>
</head>
<body>
    <div id="loader"><div class="load-line"><div id="progress"></div></div></div>
    <div class="ambient-bg" id="bg"></div>
    <div class="overlay-dim"></div>
    <canvas id="webgl-canvas"></canvas>
    
    <div class="wrapper" id="ui">
        <div class="header">
            <div class="status-pill">
                <span id="date">LOADING</span>
                <span id="clock">00:00:00</span>
            </div>
        </div>
        <div class="side-nav nav-left">
            <div class="btn" onclick="openPage('settings')"><i data-lucide="settings"></i></div>
            <div class="btn" onclick="openPage('games')"><i data-lucide="gamepad-2"></i></div>
        </div>
        <div class="brand">
            <h1 class="logo">HRN</h1>
        </div>
        <div class="side-nav nav-right">
            <div class="btn" onclick="openPage('about')"><i data-lucide="info"></i></div>
            <div class="btn" onclick="openPage('add')"><i data-lucide="plus"></i></div>
        </div>
    </div>

    <div id="container"><iframe id="frame" src=""></iframe></div>

    <script id="vs" type="x-shader/x-vertex">
        attribute vec2 a_pos; attribute float a_size; attribute float a_op;
        uniform vec2 u_res; uniform float u_time; varying float v_op;
        void main() {
            vec2 clip = (a_pos / u_res * 2.0) - 1.0;
            gl_Position = vec4(clip * vec2(1, -1), 0, 1);
            gl_PointSize = a_size * (1.0 + sin(u_time + a_pos.x)*0.2);
            v_op = a_op;
        }
    </script>
    <script id="fs" type="x-shader/x-fragment">
        precision mediump float; uniform vec3 u_color; varying float v_op;
        void main() {
            if (distance(gl_PointCoord, vec2(0.5)) > 0.5) discard;
            gl_FragColor = vec4(u_color, v_op);
        }
    </script>

    <script>
        lucide.createIcons();
        const $ = id => document.getElementById(id);
        const canvas = $('webgl-canvas'), gl = canvas.getContext('webgl');
        let particles = [], pAmount = 0, pEnabled = true, program;
        const defaultBg = "https://img.freepik.com/free-vector/black-background-with-wavy-lines_52683-76524.jpg";

        function sync() {
            const clr = localStorage.getItem('hrn_clr') || "#89b4fa";
            const bgImg = localStorage.getItem('hrn_bg') || defaultBg;
            const title = localStorage.getItem('hrn_title') || "HRN | CORE";
            const opacity = parseFloat(localStorage.getItem('hrn_op')) || 0.8;
            const density = parseFloat(localStorage.getItem('hrn_int')) || 1.1;
            pEnabled = localStorage.getItem('hrn_part') !== 'false';

            // Apply Theme
            document.documentElement.style.setProperty('--accent', clr);
            $('dynamic-title').textContent = title;
            $('bg').style.backgroundImage = `url(${bgImg})`;
            $('bg').classList.add('loaded');
            if(localStorage.getItem('hrn_fav')) $('app-favicon').href = localStorage.getItem('hrn_fav');

            // Reset Particles
            pAmount = Math.floor(((window.innerWidth * window.innerHeight) / 10000) * density);
            particles = [];
            for (let i = 0; i < pAmount; i++) {
                particles.push({
                    x: Math.random() * window.innerWidth, y: Math.random() * window.innerHeight,
                    s: Math.random() * 3 + 2, vx: (Math.random()-0.5)*0.5, vy: (Math.random()-0.5)*0.5,
                    o: Math.random() * opacity
                });
            }
        }

        // WebGL Particle Engine
        function initGL() {
            const vS = gl.createShader(gl.VERTEX_SHADER); gl.shaderSource(vS, $('vs').text); gl.compileShader(vS);
            const fS = gl.createShader(gl.FRAGMENT_SHADER); gl.shaderSource(fS, $('fs').text); gl.compileShader(fS);
            program = gl.createProgram(); gl.attachShader(program, vS); gl.attachShader(program, fS); gl.linkProgram(program);
            gl.useProgram(program);
            gl.enable(gl.BLEND); gl.blendFunc(gl.SRC_ALPHA, gl.ONE);
        }

        function render() {
            if (!pEnabled) { gl.clear(gl.COLOR_BUFFER_BIT); requestAnimationFrame(render); return; }
            const pos = new Float32Array(pAmount * 2), size = new Float32Array(pAmount), ops = new Float32Array(pAmount);
            particles.forEach((p, i) => {
                p.x = (p.x + p.vx + window.innerWidth) % window.innerWidth;
                p.y = (p.y + p.vy + window.innerHeight) % window.innerHeight;
                pos[i*2] = p.x; pos[i*2+1] = p.y; size[i] = p.s; ops[i] = p.o;
            });
            gl.clear(gl.COLOR_BUFFER_BIT);
            const clr = localStorage.getItem('hrn_clr') || "#89b4fa";
            const r = parseInt(clr.slice(1,3),16)/255, g = parseInt(clr.slice(3,5),16)/255, b = parseInt(clr.slice(5,7),16)/255;
            gl.uniform3f(gl.getUniformLocation(program, "u_color"), r, g, b);
            gl.uniform2f(gl.getUniformLocation(program, "u_res"), window.innerWidth, window.innerHeight);
            gl.uniform1f(gl.getUniformLocation(program, "u_time"), performance.now()/1000);
            
            const bind = (name, data, size) => {
                const buf = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, buf);
                gl.bufferData(gl.ARRAY_BUFFER, data, gl.STATIC_DRAW);
                const loc = gl.getAttribLocation(program, name);
                gl.enableVertexAttribArray(loc); gl.vertexAttribPointer(loc, size, gl.FLOAT, false, 0, 0);
            };
            bind("a_pos", pos, 2); bind("a_size", size, 1); bind("a_op", ops, 1);
            gl.drawArrays(gl.POINTS, 0, pAmount);
            requestAnimationFrame(render);
        }

        function openPage(name) {
            $('frame').src = name + '.html';
            $('container').style.display = 'block';
            setTimeout(() => $('container').classList.add('active'), 10);
        }

        window.addEventListener('message', e => {
            if (e.data === 'sync') sync();
            if (e.data === 'close') {
                $('container').classList.remove('active');
                setTimeout(() => { $('container').style.display = 'none'; $('frame').src = ""; }, 400);
            }
        });

        window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; sync(); };
        
        // Timer
        setInterval(() => {
            const n = new Date();
            $('clock').textContent = n.toTimeString().split(' ')[0];
            $('date').textContent = n.toLocaleDateString('en-US', { weekday: 'short', day: 'numeric' }).toUpperCase();
        }, 1000);

        window.onload = () => {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            initGL(); sync(); render();
            $('progress').style.width = "100%";
            setTimeout(() => { $('loader').style.opacity = '0'; $('ui').classList.add('active'); }, 500);
        };
    </script>
</body>
</html>
